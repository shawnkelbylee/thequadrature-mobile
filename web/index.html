<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // THE APERTURE</title>
    
    <script>
        // --- HARD NULLIFICATION PROTOCOL ---
        sessionStorage.setItem('Q_BOOT_COMPLETE', 'true');
        window.Q_BOOT_COMPLETE = true;
        
        window.runBootSequence = function() { return; };
        window.initBoot = function() { return; };
        window.triggerBoot = function() { return; };

        const purgeObserver = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1) { 
                        const text = node.textContent || node.innerText || "";
                        if (text.toLowerCase().includes('aknowledge') || text.toLowerCase().includes('acknowledge')) {
                            node.style.display = 'none !important';
                            node.style.opacity = '0 !important';
                            node.remove();
                        }
                    }
                });
            });
        });
        
        window.addEventListener('DOMContentLoaded', () => {
            purgeObserver.observe(document.body, { childList: true, subtree: true });
        });
    </script>

    <script src="q-ui.js"></script>
    <script src="q-core.js"></script>
    <script src="q-hub.js"></script>
    <script src="q-planner.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root { 
            --theme-main: #00f0ff;
            --theme-dim: rgba(0, 240, 255, 0.2);
            --white-pure: #ffffff; 
            --starlight: rgba(255, 255, 255, 0.7); 
            --q-metal: #e2e8f0;
            --q-blue-glow: rgba(0, 163, 255, 0.5);
            --white-flash: #ffffff;
        }

        html, body { 
            position: fixed !important; top: 0px !important; left: 0px !important; right: 0px !important; bottom: 0px !important; 
            width: 100vw !important; height: var(--app-height, 100vh) !important; 
            margin: 0px !important; padding: 0px !important; 
            overflow: hidden !important; touch-action: none !important; overscroll-behavior: none !important; transform: none !important; 
            background-color: #010205; 
        }

        body > *:not(.home-container):not(#portal-frame):not(.space-bg):not(#warp-star-field):not(.nebula-left):not(.nebula-right):not(.dust-layer-global):not(.global-header):not(.global-footer):not(.corner-panel):not(.mobile-routing-grid):not(.wing-panel):not(script):not(style):not(iframe):not(meta):not(title):not(#q-ui-injected-flag):not(.q-hub-overlay):not(.q-planner-overlay):not(#q-library-reader-overlay):not(.q-nav-bar):not(.q-control-strip):not(#mobile-telemetry-ribbon):not(#q-universal-controls):not(#q-mic-fab):not(#q-mic-fab-desktop):not(.desktop-only):not(.center-axis-btn) {
            display: none !important; 
            opacity: 0 !important; 
            pointer-events: none !important; 
            visibility: hidden !important;
            z-index: -9999 !important;
        }

        body.sequencing > *:not(.home-container):not(#portal-frame):not(script):not(style):not(.mobile-routing-grid) {
            opacity: 0 !important; transition: opacity 0.4s ease-out; pointer-events: none;
        }

        .global-header { position: absolute; top: 4vh; left: 0; width: 100vw; display: flex; justify-content: center; align-items: center; text-align: center; font-family: 'Courier New', Courier, monospace; font-weight: 900; font-size: 2.8rem; letter-spacing: 16px; padding-left: 16px; color: #ffffff; z-index: 50; pointer-events: none; text-shadow: 0 0 15px rgba(0, 163, 255, 0.8), 0 0 5px rgba(255, 255, 255, 0.5); }
        .global-footer { position: absolute; bottom: 6vh; left: 0; width: 100vw; display: flex; justify-content: center; align-items: center; text-align: center; font-family: 'Courier New', Courier, monospace; font-weight: 700; font-size: 1.4rem; letter-spacing: 4px; padding-left: 4px; color: rgba(255, 255, 255, 0.85); z-index: 50; pointer-events: none; text-shadow: 0 2px 5px rgba(0,0,0,0.9), 0 0 10px rgba(0, 163, 255, 0.3); }

        .panel-label { height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-size: 0.9rem; letter-spacing: 4px; padding-left: 4px; font-weight: 700; color: var(--q-metal); text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.4); position: relative; z-index: 2; box-sizing: border-box; font-family: 'Orbitron'; pointer-events: none; }
        .tl .panel-label { padding-left: 59px; } .tr .panel-label { padding-right: 51px; } .bl .panel-label { padding-left: 59px; } .br .panel-label { padding-right: 51px; }

        /* --- THE HOME CORE --- */
        .home-container { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 52vh; height: 52vh; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .iris-ring, .core-void { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; pointer-events: none; transition: transform 0.8s cubic-bezier(0.5, 0, 0.2, 1); }
        .iris-ring { z-index: 10; filter: drop-shadow(0 0 35px rgba(0,0,0,0.95)); }
        .core-void { width: 68%; height: 68%; background: #000; border-radius: 50%; z-index: 5; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,1); margin: auto; opacity: 1; }

        .star-field { position: absolute; inset: 0; z-index: 3; pointer-events: none;}
        .star { position: absolute; background: #fff; border-radius: 50%; }

        .q-core-asset { position: absolute; width: 50%; height: 50%; left: 51.2%; top: 50%; transform: translate(-50%, -50%); background: url('assets/core-q.png') center/contain no-repeat; z-index: 15; filter: drop-shadow(0 0 25px var(--q-blue-glow)); animation: subtle-pulse 4s ease-in-out infinite; transition: all 0.5s ease; }

        @keyframes subtle-pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1) drop-shadow(0 0 25px var(--q-blue-glow)); } 50% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.2) drop-shadow(0 0 40px var(--q-blue-glow)); } }
        @keyframes hyper-jump { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; } 5% { opacity: var(--max-op, 1); } 100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.2); opacity: 0; } }

        /* --- KINETIC ACTUATION STATES --- */
        #portal-frame { position: fixed; inset: 0; width: 100vw; height: 100vh; border: none; z-index: 100; opacity: 0 !important; pointer-events: none; background-color: #010205; clip-path: circle(5% at 50% 50%); }
        #iris-blade-group { transform-origin: 50px 50px; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease-in 0.2s; }
        body.sequencing #iris-blade-group { transform: rotate(90deg) scale(1.6); opacity: 0; }
        body.sequencing .iris-ring { opacity: 0; transition: opacity 0.4s ease-in 0.5s; }
        body.sequencing .core-void { opacity: 0; transition: opacity 0.3s ease-in 0.4s; }
        body.sequencing #portal-frame { opacity: 1 !important; clip-path: circle(150% at 50% 50%); transition: opacity 0.2s ease-in 0.3s, clip-path 1.1s cubic-bezier(0.7, 0, 0.1, 1) 0.3s; }
        body.sequencing .q-core-asset { animation: q-core-portal 1.1s forwards cubic-bezier(0.7, 0, 0.1, 1) 0.3s; }
        body.sequencing .mobile-routing-grid { opacity: 0 !important; transition: 0.2s; }
        body.sequencing .center-axis-btn { opacity: 0 !important; transition: opacity 0.4s ease-out; }

        @keyframes q-core-portal { 0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1) drop-shadow(0 0 25px var(--q-blue-glow)); opacity: 1; } 40% { transform: translate(-50%, -50%) scale(1.5); filter: brightness(3) drop-shadow(0 0 60px var(--white-flash)); opacity: 1; } 70% { transform: translate(-50%, -50%) scale(10); filter: brightness(5) drop-shadow(0 0 100px var(--white-flash)); opacity: 0.5; } 100% { transform: translate(-50%, -50%) scale(40); filter: brightness(8) drop-shadow(0 0 0px var(--white-flash)); opacity: 0; } }

        /* --- THE CENTER AXIS BUTTONS --- */
        .center-axis-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 320px; /* CRITICAL FIX: Expanded width to match your native asset */
            height: 85px; /* CRITICAL FIX: Expanded height to match your native asset */
            z-index: 100;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .axis-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.85;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6));
        }

        /* Pushed outward to perfect alignment */
        .axis-omni { bottom: calc(50% + 30.5vh); }
        .axis-dash { top: calc(50% + 30.5vh); }

        .axis-label {
            font-family: 'Orbitron';
            font-size: 1.0rem;
            letter-spacing: 4px;
            padding-left: 4px; 
            font-weight: 900; 
            color: var(--q-metal);
            text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.4);
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        /* Optical Centering: Counters the gravity of the curved edge */
        .axis-omni .axis-label { transform: translateY(-4px); }
        .axis-dash .axis-label { transform: translateY(4px); }

        .axis-omni:hover { transform: translateX(-50%) translateY(-2px); filter: brightness(1.2) drop-shadow(0 0 15px rgba(0, 163, 255, 0.4)); }
        .axis-dash:hover { transform: translateX(-50%) translateY(2px); filter: brightness(1.2) drop-shadow(0 0 15px rgba(0, 163, 255, 0.4)); }

        /* --- THE MOBILE HOME PROTOCOL --- */
        .desktop-only { display: flex !important; }
        .mobile-routing-grid { display: none; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 85vw; max-width: 400px; height: auto; flex-direction: column; gap: 16px; z-index: 30; pointer-events: none; }
        .m-panel { position: relative; border-radius: 8px; cursor: pointer; pointer-events: auto; display: flex; justify-content: center; align-items: center; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden; border: 1px solid rgba(255,255,255,0.1); width: 100%; height: 75px; opacity: 0; transform: translateY(30px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .m-frost { position: absolute; inset: 0; background: rgba(15, 20, 35, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1; }
        .m-bg { position: absolute; inset: 0; background: url('assets/panel-frame.png') center/150% 150% no-repeat; z-index: 2; opacity: 0.5; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); }
        .m-label { position: relative; z-index: 3; font-family: 'Orbitron'; font-size: 0.9rem; font-weight: 700; color: var(--q-metal); letter-spacing: 4px; text-shadow: 0 2px 5px rgba(0,0,0,0.9), 0 0 8px rgba(255,255,255,0.3); display: flex; align-items: center; gap: 8px; }

        body.mobile-revealed .mobile-routing-grid { pointer-events: auto; }
        body.mobile-revealed .q-core-asset { opacity: 0.15; filter: blur(8px); }
        body.mobile-revealed .iris-ring { transform: rotate(45deg); filter: drop-shadow(0 0 15px rgba(0,0,0,0.95)); }
        body.mobile-revealed .m-panel { opacity: 1; transform: translateY(0); }
        body.mobile-revealed .m-panel:nth-child(1) { transition-delay: 0.05s; }
        body.mobile-revealed .m-panel:nth-child(2) { transition-delay: 0.10s; }
        body.mobile-revealed .m-panel:nth-child(3) { transition-delay: 0.15s; }
        body.mobile-revealed .m-panel:nth-child(4) { transition-delay: 0.20s; }

        @media (max-width: 950px) {
            .desktop-only { display: none !important; }
            .mobile-routing-grid { display: flex; }
        }
    </style>
</head>
<body class="mode-q">

    <div id="portal-frame"></div>
    <div id="warp-star-field"></div>

    <div class="global-header desktop-only">THE QUADRATURE</div>
    <div class="global-footer desktop-only">BASED IN SCIENCE BATHED IN CULTURE & BUILT FOR THE DIGITAL AGE</div>

    <div class="center-axis-btn axis-omni desktop-only" onclick="if(window.Q_OmniPlanner) window.Q_OmniPlanner.openPlanner()">
        <img class="axis-bg" src="assets/omni-panel.png" alt="omni background" />
        <span class="axis-label">OMNI-PLANNER</span>
    </div>

    <div class="center-axis-btn axis-dash desktop-only" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()">
        <img class="axis-bg" src="assets/dash-panel.png" alt="dash background" />
        <span class="axis-label">DASHBOARD</span>
    </div>
    
    <div class="mobile-routing-grid" id="mobile-routing-grid">
        <div class="m-panel" data-route="PHYSIOLOGICAL.html">
            <div class="m-frost"></div><div class="m-bg"></div>
            <div class="m-label">PHYSIOLOGICAL</div>
        </div>
        <div class="m-panel" data-route="METAPHYSICAL.html">
            <div class="m-frost"></div><div class="m-bg" style="transform: scaleX(-1);"></div>
            <div class="m-label">METAPHYSICAL</div>
        </div>
        <div class="m-panel" data-route="METEOROLOGICAL.html">
            <div class="m-frost"></div><div class="m-bg" style="transform: scaleY(-1);"></div>
            <div class="m-label">METEOROLOGICAL</div>
        </div>
        <div class="m-panel" data-route="ASTROPHYSICAL.html">
            <div class="m-frost"></div><div class="m-bg" style="transform: scale(-1, -1);"></div>
            <div class="m-label">ASTROPHYSICAL</div>
        </div>
        
        <div style="display:flex; justify-content:space-between; gap:10px; width:100%; margin-top: 10px;">
            <button onclick="if(window.Q_OmniPlanner) window.Q_OmniPlanner.openPlanner()" style="flex:1; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); padding: 12px; font-family: 'Orbitron'; font-size: 0.65rem; font-weight: bold; letter-spacing: 1px; cursor: pointer; border-radius: 4px; pointer-events:auto;">
                OMNI-PLANNER
            </button>
            <button onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()" style="flex:1; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); padding: 12px; font-family: 'Orbitron'; font-size: 0.65rem; font-weight: bold; letter-spacing: 1px; cursor: pointer; border-radius: 4px; pointer-events:auto;">
                DASHBOARD
            </button>
        </div>
    </div>

    <div class="home-container q-center-dial">
        <div class="core-void">
            <div class="star-field" id="core-star-field"></div>
        </div>
        <div class="iris-ring"></div>
        <div class="q-core-asset"></div>
    </div>

    <script>
        window.addEventListener('q-ui-mounted', () => {
            const routingMap = {
                'tl': 'PHYSIOLOGICAL',
                'tr': 'METAPHYSICAL',
                'bl': 'METEOROLOGICAL',
                'br': 'ASTROPHYSICAL'
            };

            for (const [pos, label] of Object.entries(routingMap)) {
                const panel = document.querySelector(`.corner-panel.${pos}`);
                if (panel) {
                    panel.setAttribute('onclick', `window.executeHomeSequence('${label}.html')`);
                    panel.innerHTML = `
                        <div class="frost-zone"></div>
                        <div class="panel-bg"></div>
                        <div class="panel-label">${label}</div>
                    `;
                }
            }
        });

        function injectPerfectIris() {
            const container = document.querySelector('.iris-ring');
            if(!container || document.getElementById('perfect-iris-svg')) return;
            
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("id", "perfect-iris-svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.style.cssText = "width:100%; height:100%; position:absolute;";
            
            let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            defs.innerHTML = `
                <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#94a3b8" />
                    <stop offset="50%" stop-color="#475569" />
                    <stop offset="100%" stop-color="#0f172a" />
                </linearGradient>
                <linearGradient id="shiny-rim-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="50%" stop-color="#cbd5e1" />
                    <stop offset="100%" stop-color="#475569" />
                </linearGradient>
                <linearGradient id="glass-bevel" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(0, 240, 255, 0.8)" />
                    <stop offset="50%" stop-color="rgba(255, 255, 255, 0.9)" />
                    <stop offset="100%" stop-color="rgba(0, 163, 255, 0.8)" />
                </linearGradient>
                <linearGradient id="blade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#64748b" />
                    <stop offset="50%" stop-color="#334155" />
                    <stop offset="100%" stop-color="#0f172a" />
                </linearGradient>
                <filter id="blade-shadow">
                    <feDropShadow dx="-1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.95"/>
                </filter>
                <clipPath id="iris-housing-clip">
                    <circle cx="50" cy="50" r="47.5" />
                </clipPath>
            `;
            svg.appendChild(defs);
            
            let baseRing = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            baseRing.setAttribute("cx", "50"); baseRing.setAttribute("cy", "50"); baseRing.setAttribute("r", "48");
            baseRing.setAttribute("fill", "none"); baseRing.setAttribute("stroke", "url(#metal-grad)"); baseRing.setAttribute("stroke-width", "1.5");
            svg.appendChild(baseRing);

            let shinyRim = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            shinyRim.setAttribute("cx", "50"); shinyRim.setAttribute("cy", "50"); shinyRim.setAttribute("r", "47.1");
            shinyRim.setAttribute("fill", "none"); shinyRim.setAttribute("stroke", "url(#shiny-rim-grad)"); shinyRim.setAttribute("stroke-width", "0.5");
            svg.appendChild(shinyRim);

            let staticWrapper = document.createElementNS("http://www.w3.org/2000/svg", "g");
            staticWrapper.setAttribute("clip-path", "url(#iris-housing-clip)");

            let cutsGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            cutsGroup.setAttribute("id", "iris-blade-group");
            
            for(let i=0; i<8; i++) {
                let angle = i * 45;
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", "M 47,2 A 48,48 0 0,1 84,16 L 38,38 L 22,42 Z");
                path.setAttribute("fill", "url(#blade-grad)");
                path.setAttribute("stroke", "#0f172a");
                path.setAttribute("stroke-width", "0.5");
                path.setAttribute("filter", "url(#blade-shadow)");
                path.setAttribute("transform", `rotate(${angle} 50 50)`);
                cutsGroup.appendChild(path);
                
                let highlight = document.createElementNS("http://www.w3.org/2000/svg", "path");
                highlight.setAttribute("d", "M 47,2 A 48,48 0 0,1 84,16 L 38,38");
                highlight.setAttribute("fill", "none");
                highlight.setAttribute("stroke", "rgba(255,255,255,0.3)");
                highlight.setAttribute("stroke-width", "0.5");
                highlight.setAttribute("transform", `rotate(${angle} 50 50)`);
                cutsGroup.appendChild(highlight);
            }
            
            staticWrapper.appendChild(cutsGroup);
            svg.appendChild(staticWrapper);

            let glassBevel = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            glassBevel.setAttribute("cx", "50"); glassBevel.setAttribute("cy", "50"); glassBevel.setAttribute("r", "46");
            glassBevel.setAttribute("fill", "none"); glassBevel.setAttribute("stroke", "url(#glass-bevel)"); glassBevel.setAttribute("stroke-width", "2.5");
            glassBevel.setAttribute("filter", "drop-shadow(0 0 6px rgba(0, 240, 255, 0.6))");
            svg.appendChild(glassBevel);

            container.appendChild(svg);
        }

        function initStars() {
            const coreField = document.getElementById('core-star-field');
            if(!coreField) return;
            for(let i=0; i<450; i++) {
                const star = document.createElement('div');
                star.className = 'star'; const angle = Math.random() * Math.PI * 2; const dist = Math.random() * 4 + 21; 
                star.style.setProperty('--tx', Math.cos(angle) * dist + 'vh'); star.style.setProperty('--ty', Math.sin(angle) * dist + 'vh');
                let size = (Math.random() > 0.85) ? (Math.random() * 2.5 + 1.0) : (Math.random() * 1.2 + 0.3);
                star.style.width = size + 'px'; star.style.height = size + 'px'; star.style.left = '50%'; star.style.top = '50%';
                let driftDur = Math.random() * 8 + (size > 1.5 ? 8 : 12);
                star.style.setProperty('--max-op', (size > 1.5) ? (Math.random() * 0.3 + 0.7) : (Math.random() * 0.5 + 0.2));
                star.style.animation = `hyper-jump ${driftDur}s -${Math.random()*20}s cubic-bezier(0.5, 0.0, 1, 1) infinite`;
                coreField.appendChild(star);
            }
        }

       window.executeHomeSequence = function(targetUrl) {
            if (document.body.classList.contains('sequencing')) return;
            document.body.classList.add('sequencing');
            setTimeout(() => { window.location.href = targetUrl; }, 1300); 
        };

        window.addEventListener('click', (e) => {
            const el = e.target.closest('.corner-panel, .m-panel');
            if (!el) return;
            
            const target = el.getAttribute('data-target') || el.getAttribute('data-route');
            if (target) {
                e.preventDefault();
                e.stopPropagation();
                window.executeHomeSequence(target);
            }
        }, true);

        let isMobileRevealed = false;
        function initMobileHome() {
            document.addEventListener('click', (e) => {
                if(window.innerWidth <= 950 && !isMobileRevealed && !e.target.closest('.m-panel')) {
                    document.body.classList.add('mobile-revealed');
                    isMobileRevealed = true;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            injectPerfectIris();
            initStars();
            if(window.generateStars) window.generateStars('warp-star-field');
            initMobileHome();
            setTimeout(() => { document.body.style.opacity = "1"; }, 100);
        });
    </script>
</body>
</html>
