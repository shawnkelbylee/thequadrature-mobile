<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // APERTURE GATEWAY</title>
    
    <script src="../q-ui-global.js?v=16.4"></script>
    <script src="../q-core.js?v=16.4"></script>
    <script src="../q-ui-planner.js?v=16.4"></script>
    <script src="../q-hub.js?v=16.4"></script>
    
    <script>
        if (/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            document.documentElement.classList.add('is-mobile-device');
        }
        if(sessionStorage.getItem('Q_BOOT_COMPLETE') === 'true') {
            document.write('<style>#boot-overlay { display: none !important; }</style>');
            window.addEventListener('DOMContentLoaded', () => document.body.classList.remove('boot-active'));
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --chrome-grad: linear-gradient(135deg, #ffffff 0%, #777777 25%, #222222 50%, #999999 75%, #ffffff 100%);
            --frost-base: rgba(25, 30, 40, 0.45);
        }

        body {
            background-color: #020406 !important;
            background-image: none !important;
            margin: 0; height: 100dvh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif;
        }

        /* 1. CLEAN FROSTED PANELS WITH ASYMMETRIC METALLIC BORDERS */
        .vector-anchor, .wing-content {
            background: var(--frost-base) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            position: absolute;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box;
            border: none !important; /* Remove old border logic */
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        /* Asymmetric Border Logic using pseudo-elements to prevent streaks */
        .vector-anchor::before, .wing-content::before {
            content: ''; position: absolute; inset: 0;
            padding: 1px; /* Default thin */
            background: var(--chrome-grad);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            pointer-events: none;
        }

        /* Specific Asymmetric Weights */
        .tl::before { padding: 4px 1px 1px 4px; }
        .tr::before { padding: 4px 4px 1px 1px; }
        .bl::before { padding: 1px 1px 4px 4px; }
        .br::before { padding: 1px 4px 4px 1px; }
        .wing-left .wing-content::before { padding: 1px 1px 1px 5px; }
        .wing-right .wing-content::before { padding: 1px 5px 1px 1px; }

        .vector-anchor { width: 360px; height: 100px; z-index: 100; cursor: pointer; }
        .tl { top: 7vh; left: 2vw; border-radius: 8px 0 0 0; }
        .tr { top: 7vh; right: 2vw; border-radius: 0 8px 0 0; }
        .bl { bottom: 8vh; left: 2vw; border-radius: 0 0 0 8px; }
        .br { bottom: 8vh; right: 2vw; border-radius: 0 0 8px 0; }

        .gateway-title { font-weight: 900; font-size: 1.1rem; letter-spacing: 4px; color: #ffffff; text-align: center; }

        /* 2. DYNAMIC NEBULA BACKGROUND */
        .nebula-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .cloud { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(40, 60, 90, 0.25) 0%, transparent 70%); filter: blur(80px); animation: drift 40s infinite alternate; }

        @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(5vw, 5vh) scale(1.3); } }

        /* 3. CENTER DIAL & STARFIELD */
        .aperture-dial {
            position: relative; width: 60vh; height: 60vh; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: #000; overflow: hidden; z-index: 30;
        }
        .aperture-dial::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            padding: 5px; background: var(--chrome-grad);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
        }

        #dense-stars { position: absolute; inset: 0; border-radius: 50%; z-index: 1; transform-style: preserve-3d; }
        .star-kinetic { position: absolute; top: 50%; left: 50%; width: 1.5px; height: 1.5px; background: #fff; border-radius: 50%; animation: warp-travel linear infinite; }

        /* 4. THE ENGRAVED SVG "Q" */
        .q-container { width: 35vh; height: 35vh; z-index: 10; animation: rotate-q 12s linear infinite; perspective: 1000px; }
        
        @keyframes rotate-q {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .chrome-q { width: 100%; height: 100%; fill: url(#chrome-fill); filter: drop-shadow(0 0 20px rgba(255,255,255,0.25)); }

        @keyframes warp-travel {
            0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--radius)) translateZ(-400px); opacity: 0; }
            20% { opacity: var(--opacity); }
            80% { opacity: var(--opacity); }
            100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--radius)) translateZ(400px); opacity: 0; }
        }

        /* WING TELEMETRY STYLING */
        .w-head { border-bottom: 1px solid #555 !important; color: #fff !important; margin-bottom: 8px; }
        .val-lg, .q-val, .val-sm, .w-lbl { color: #fff !important; }
        .fmt-toggle { border: 1px solid #fff !important; background: transparent !important; }
        
        .q-nav-bar, .q-global-controls, #mobile-telemetry-ribbon, .q-control-strip, #q-mic-fab { display: none !important; }
    </style>
</head>
<body class="mode-q boot-active">

    <div class="nebula-layer" id="nebula"></div>

    <div class="vector-anchor tl" onclick="window.location.href='../personal/index.html'"><div class="gateway-title">PERSONAL QUAD</div></div>
    <div class="vector-anchor tr" onclick="window.location.href='../commercial/index.html'"><div class="gateway-title">COMMERCIAL QUAD</div></div>
    <div class="vector-anchor bl" onclick="window.location.href='../physical/index.html'"><div class="gateway-title">PHYSICAL ASSETS</div></div>
    <div class="vector-anchor br" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()"><div class="gateway-title">DASHBOARD</div></div>

    <div class="aperture-dial">
        <div id="dense-stars"></div>
        <div class="q-container">
            <svg class="chrome-q" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="chrome-fill" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffffff" />
                        <stop offset="25%" style="stop-color:#777777" />
                        <stop offset="50%" style="stop-color:#222222" />
                        <stop offset="75%" style="stop-color:#999999" />
                        <stop offset="100%" style="stop-color:#ffffff" />
                    </linearGradient>
                </defs>
                <path d="M50,15 C32,15 18,29 18,46 C18,63 32,77 50,77 C56,77 62,75 67,71 L75,85 L82,80 L74,68 C79,62 82,54 82,46 C82,29 68,15 50,15 Z M50,22 C63,22 74,33 74,46 C74,53 71,60 66,65 L64,62 C70,58 73,52 73,46 C73,34 63,24 50,24 C37,24 27,34 27,46 C27,58 37,68 50,68 C55,68 60,66 64,62 L66,65 C61,70 56,72 50,72 C35,72 23,60 23,46 C23,32 35,20 50,20 Z" />
            </svg>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Nebula Clouds
            const neb = document.getElementById('nebula');
            for(let i=0; i<8; i++) {
                let c = document.createElement('div');
                c.className = 'cloud';
                c.style.width = (Math.random() * 40 + 30) + 'vw';
                c.style.height = c.style.width;
                c.style.left = (Math.random() * 100 - 20) + 'vw';
                c.style.top = (Math.random() * 100 - 20) + 'vh';
                c.style.animationDelay = -(Math.random() * 40) + 's';
                neb.appendChild(c);
            }

            // Dense Stars
            const stars = document.getElementById('dense-stars');
            for(let i=0; i<1000; i++) {
                let s = document.createElement('div');
                s.className = 'star-kinetic';
                s.style.setProperty('--angle', Math.random() * 360 + 'deg');
                s.style.setProperty('--radius', (Math.random() * 300) + 'px');
                s.style.setProperty('--opacity', Math.random());
                s.style.animationDuration = (Math.random() * 3 + 2) + 's';
                s.style.animationDelay = -(Math.random() * 10) + 's';
                stars.appendChild(s);
            }
        });

        // WING UPDATER
        window.addEventListener('q-tick', (e) => {
            const { t, qData, legacyDateStr, legacyTimeStr } = e.detail;
            document.getElementById('leg-date').innerText = legacyDateStr.toUpperCase();
            document.getElementById('leg-time').innerText = legacyTimeStr;
            document.getElementById('mean-deg').innerText = qData.meanArc.toFixed(2) + "°";
            document.getElementById('true-deg').innerText = qData.trueArc.toFixed(2) + "°";
            
            let block = window.getQBlockByTime ? window.getQBlockByTime(t) : null;
            const wing = document.getElementById('q-coord-wing');
            if (wing) {
                if (block && block.type === 'PYLON') {
                    wing.innerHTML = block.name;
                } else {
                    wing.innerHTML = `QC${block ? block.cycle : 0} Q${qData.quad} S${qData.sect} D${qData.day}`;
                }
            }
        });
    </script>
</body>
</html>
