<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>THE QUADRATURE // APERTURE GATEWAY</title>
    
    <script>
        // GATEWAY DIRECT OVERRIDE: Neutralize boot overlays
        sessionStorage.setItem('Q_BOOT_COMPLETE', 'true');
    </script>

    <style>
        /* --- GATEWAY PURGE PROTOCOL --- */
        .q-nav-bar, 
        .q-control-strip, 
        #mobile-telemetry-ribbon, 
        #q-universal-controls,
        #q-mic-fab,
        #q-mic-fab-desktop { 
            display: none !important; 
            opacity: 0 !important; 
            pointer-events: none !important; 
            visibility: hidden !important;
        }

        /* --- NEBULA EXPANSION OVERRIDE --- */
        .nebula-left {
            width: 65vw !important;
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 0% 50%, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%) !important;
            mask-image: radial-gradient(ellipse 100% 100% at 0% 50%, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%) !important;
        }
        .nebula-right {
            width: 65vw !important;
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 100% 50%, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%) !important;
            mask-image: radial-gradient(ellipse 100% 100% at 100% 50%, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%) !important;
        }
    </style>

    <script src="../q-ui-global.js"></script>
    <script src="../q-core.js"></script>
    <script src="../q-hub.js"></script>
    <script src="../q-ui-planner.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --corner-gap-x: 28vh !important;
            --corner-gap-y: 26vh !important;
            --center-gap-x: 36vh !important;
            --q-blue-glow: rgba(0, 163, 255, 0.5);
            --white-flash: #ffffff;
        }

        /* --- PORTAL PRE-LOAD FRAME --- */
        #portal-frame {
            position: fixed; inset: 0;
            width: 100vw; height: 100vh;
            border: none; z-index: 1;
            opacity: 0 !important; /* CRITICAL FIX: Lock opacity to 0 to prevent unstyled bleed-through */
            pointer-events: none;
        }

        /* --- UNIVERSAL SEQUENCING FADE --- */
        body.sequencing > *:not(.aperture-container):not(#portal-frame) {
            opacity: 0 !important;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
        }

        /* --- THE APERTURE CORE --- */
        .aperture-container {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 52vh; height: 52vh;
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .iris-ring, .core-void {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
        }
        
        .iris-ring {
            z-index: 10;
            filter: drop-shadow(0 0 35px rgba(0,0,0,0.95));
            /* Compressed to 1.25s for the Kinematic Hold */
            transition: transform 1.25s cubic-bezier(0.5, 0, 1, 1);
        }

        .core-void {
            width: 68%; height: 68%;
            background: #000; border-radius: 50%;
            z-index: 5; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
            margin: auto;
            opacity: 1;
            /* Compressed to 1.25s */
            transition: transform 1.25s cubic-bezier(0.5, 0, 1, 1), opacity 0.8s ease-in 0.2s;
        }

        .star-field { position: absolute; inset: 0; z-index: 3; pointer-events: none;}
        .star { position: absolute; background: #fff; border-radius: 50%; }

        .q-core-asset {
            position: absolute; width: 50%; height: 50%;
            left: 51.2%; top: 50%; 
            transform: translate(-50%, -50%);
            background: url('../assets/core-q.png') center/contain no-repeat;
            z-index: 15;
            filter: drop-shadow(0 0 25px var(--q-blue-glow));
            animation: subtle-pulse 4s ease-in-out infinite;
        }

        /* --- KINETIC ACTUATION STATES --- */
        
        body.sequencing .iris-ring {
            transform: scale(15) rotate(270deg);
        }

        /* Fade the void to reveal the preloaded portal frame behind it */
        body.sequencing .core-void {
            transform: scale(15);
            opacity: 0;
        }

        /* Massive scale to turn the Q's transparent center into a viewing window */
        /* Compressed to 1.25s */
        body.sequencing .q-core-asset {
            animation: q-core-portal 1.25s forwards cubic-bezier(0.7, 0, 1, 1);
        }

        @keyframes q-core-portal {
            0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1) drop-shadow(0 0 25px var(--q-blue-glow)); }
            50% { transform: translate(-50%, -50%) scale(1.5); filter: brightness(3) drop-shadow(0 0 60px var(--white-flash)); }
            80% { transform: translate(-50%, -50%) scale(10); filter: brightness(5) drop-shadow(0 0 100px var(--white-flash)); }
            100% { transform: translate(-50%, -50%) scale(80); filter: brightness(8) drop-shadow(0 0 0px var(--white-flash)); }
        }

        @keyframes subtle-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1) drop-shadow(0 0 25px var(--q-blue-glow)); }
            50% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.2) drop-shadow(0 0 40px var(--q-blue-glow)); }
        }

        @keyframes hyper-jump {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            5% { opacity: var(--max-op, 1); }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body class="mode-q">

    <iframe id="portal-frame" src="about:blank"></iframe>

    <div class="aperture-container q-center-dial">
        <div class="core-void">
            <div class="star-field" id="core-star-field"></div>
        </div>
        <div class="iris-ring"></div>
        <div class="q-core-asset"></div>
    </div>

    <script>
        function injectPerfectIris() {
            const container = document.querySelector('.iris-ring');
            if(!container || document.getElementById('perfect-iris-svg')) return;
            
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("id", "perfect-iris-svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.style.cssText = "width:100%; height:100%; position:absolute;";
            
            let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
            defs.innerHTML = `
                <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#94a3b8" />
                    <stop offset="50%" stop-color="#475569" />
                    <stop offset="100%" stop-color="#0f172a" />
                </linearGradient>
                <linearGradient id="shiny-rim-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="50%" stop-color="#cbd5e1" />
                    <stop offset="100%" stop-color="#475569" />
                </linearGradient>
                <linearGradient id="glass-bevel" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(0, 240, 255, 0.8)" />
                    <stop offset="50%" stop-color="rgba(255, 255, 255, 0.9)" />
                    <stop offset="100%" stop-color="rgba(0, 163, 255, 0.8)" />
                </linearGradient>
                <linearGradient id="blade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#64748b" />
                    <stop offset="50%" stop-color="#334155" />
                    <stop offset="100%" stop-color="#0f172a" />
                </linearGradient>
                <filter id="blade-shadow">
                    <feDropShadow dx="-1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.95"/>
                </filter>
            `;
            svg.appendChild(defs);
            
            let baseRing = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            baseRing.setAttribute("cx", "50"); baseRing.setAttribute("cy", "50"); baseRing.setAttribute("r", "48");
            baseRing.setAttribute("fill", "none"); baseRing.setAttribute("stroke", "url(#metal-grad)"); baseRing.setAttribute("stroke-width", "1.5");
            svg.appendChild(baseRing);

            let shinyRim = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            shinyRim.setAttribute("cx", "50"); shinyRim.setAttribute("cy", "50"); shinyRim.setAttribute("r", "47.1");
            shinyRim.setAttribute("fill", "none"); shinyRim.setAttribute("stroke", "url(#shiny-rim-grad)"); shinyRim.setAttribute("stroke-width", "0.5");
            svg.appendChild(shinyRim);

            let cutsGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            cutsGroup.setAttribute("id", "iris-blade-group");
            
            for(let i=0; i<8; i++) {
                let angle = i * 45;
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", "M 47,2 A 48,48 0 0,1 84,16 L 38,38 L 22,42 Z");
                path.setAttribute("fill", "url(#blade-grad)");
                path.setAttribute("stroke", "#0f172a");
                path.setAttribute("stroke-width", "0.5");
                path.setAttribute("filter", "url(#blade-shadow)");
                path.setAttribute("transform", `rotate(${angle} 50 50)`);
                cutsGroup.appendChild(path);
                
                let highlight = document.createElementNS("http://www.w3.org/2000/svg", "path");
                highlight.setAttribute("d", "M 47,2 A 48,48 0 0,1 84,16 L 38,38");
                highlight.setAttribute("fill", "none");
                highlight.setAttribute("stroke", "rgba(255,255,255,0.3)");
                highlight.setAttribute("stroke-width", "0.5");
                highlight.setAttribute("transform", `rotate(${angle} 50 50)`);
                cutsGroup.appendChild(highlight);
            }
            svg.appendChild(cutsGroup);

            let glassBevel = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            glassBevel.setAttribute("cx", "50"); glassBevel.setAttribute("cy", "50"); glassBevel.setAttribute("r", "46");
            glassBevel.setAttribute("fill", "none"); glassBevel.setAttribute("stroke", "url(#glass-bevel)"); glassBevel.setAttribute("stroke-width", "2.5");
            glassBevel.setAttribute("filter", "drop-shadow(0 0 6px rgba(0, 240, 255, 0.6))");
            svg.appendChild(glassBevel);

            container.appendChild(svg);
        }

        function initStars() {
            const coreField = document.getElementById('core-star-field');
            for(let i=0; i<450; i++) {
                const star = document.createElement('div');
                star.className = 'star'; const angle = Math.random() * Math.PI * 2; const dist = Math.random() * 4 + 21; 
                star.style.setProperty('--tx', Math.cos(angle) * dist + 'vh'); star.style.setProperty('--ty', Math.sin(angle) * dist + 'vh');
                let size = (Math.random() > 0.85) ? (Math.random() * 2.5 + 1.0) : (Math.random() * 1.2 + 0.3);
                star.style.width = size + 'px'; star.style.height = size + 'px'; star.style.left = '50%'; star.style.top = '50%';
                let driftDur = Math.random() * 8 + (size > 1.5 ? 8 : 12);
                star.style.setProperty('--max-op', (size > 1.5) ? (Math.random() * 0.3 + 0.7) : (Math.random() * 0.5 + 0.2));
                star.style.animation = `hyper-jump ${driftDur}s -${Math.random()*20}s cubic-bezier(0.5, 0.0, 1, 1) infinite`;
                coreField.appendChild(star);
            }
        }

        window.executeApertureSequence = function(targetUrl) {
            if (document.body.classList.contains('sequencing')) return;
            
            // 1. Prime the portal frame immediately with the target vector
            const portal = document.getElementById('portal-frame');
            if(portal) portal.src = targetUrl;
            
            // 2. Lock the state and trigger CSS transitions
            document.body.classList.add('sequencing');
            
            // 3. KINEMATIC HOLD: Wait for the 1.25s animation to finish, 
            // hold static for 150ms to clear the main thread, then hard route.
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1400); 
        };

        // --- AGGRESSIVE CAPTURE-PHASE INTERCEPTOR ---
        window.addEventListener('click', (e) => {
            // CRITICAL FIX: Bypass interceptor entirely if clicking inside the dashboard, planner, or modals
            if (e.target.closest('.q-hub-overlay') || e.target.closest('.modal-overlay') || e.target.closest('.q-planner-overlay')) {
                return; 
            }

            let el = e.target;
            let targetUrl = null;
            let depth = 0;

            while (el && depth < 5 && el !== document.body) {
                const text = (el.textContent || '').trim().toLowerCase();
                const onClickStr = (el.getAttribute('onclick') || '').toLowerCase();
                const hrefStr = (el.getAttribute('href') || '').toLowerCase();

                // Explicitly intercept Dashboard intents to prevent 404 sequencing
                if (hrefStr.includes('/dashboard') || onClickStr.includes('dashboard') || text.includes('dashboard')) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (window.Q_IntegrationHub) window.Q_IntegrationHub.openHub();
                    return; // Halt interceptor loop
                }

                // Explicitly route Physical/BL Panel to the Omni-Planner
                if (hrefStr.includes('/physical') || onClickStr.includes('physical') || text.includes('physical assets') || text.includes('omni-planner') || text.includes('omni planner')) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (window.Q_OmniPlanner) window.Q_OmniPlanner.openPlanner();
                    return; // Halt interceptor loop
                }

                if (hrefStr.includes('/personal') || onClickStr.includes('personal') || text.includes('personal quad')) {
                    targetUrl = '../personal/index.html';
                } else if (hrefStr.includes('/commercial') || onClickStr.includes('commercial') || text.includes('commercial quad')) {
                    targetUrl = '../commercial/index.html';
                } 

                if (targetUrl) break;
                el = el.parentElement;
                depth++;
            }

            if (targetUrl) {
                e.preventDefault();
                e.stopPropagation(); 
                window.executeApertureSequence(targetUrl);
            }
        }, true);

        document.addEventListener('DOMContentLoaded', () => {
            injectPerfectIris();
            initStars();
            
            // UI TEXT OVERRIDE: Renames the dynamically injected label from q-ui-global.js
            const renamePanel = () => {
                const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
                let node;
                while ((node = walker.nextNode())) {
                    if (node.nodeValue.trim().toUpperCase() === 'PHYSICAL ASSETS') {
                        node.nodeValue = node.nodeValue.replace(/PHYSICAL ASSETS/ig, 'OMNI-PLANNER');
                    }
                }
            };
            
            // Run immediately and again slightly delayed to catch the UI injection
            renamePanel();
            setTimeout(renamePanel, 150);
            setTimeout(renamePanel, 500);
        });
    </script>
</body>
</html>
