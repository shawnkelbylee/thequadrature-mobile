<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>THE QUADRATURE // APERTURE GATEWAY</title>
    
    <script src="../q-ui-global.js?v=17.3.1"></script>
    <script src="../q-core.js?v=17.3.1"></script>
    <script src="../q-hub.js?v=17.3.1"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --q-blue-glow: rgba(0, 163, 255, 0.3);
            --q-metal: #e2e8f0;
            --nebula-deep: #02050a;
            --nebula-core: #081220;
            --center-gap-x: 31vh;
            --corner-gap-y: 24vh;
            --corner-gap-x: 23vh;
            
            /* Chrono-Face Sync Variables */
            --theme-main: #00f0ff;
            --theme-dim: rgba(0, 240, 255, 0.2);
            --starlight: rgba(255, 255, 255, 0.6);
            --micColor: #00f0ff;
            --micGlow: rgba(0, 240, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            background-color: var(--nebula-deep);
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: var(--q-metal);
            display: flex; justify-content: center; align-items: center;
        }

        /* --- LEGACY UI PURGE --- */
        #q-wing-left, #q-wing-right, .q-nav-bar, .q-control-strip, #mobile-telemetry-ribbon, #q-universal-controls {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* --- DEEP NEBULA ENGINE --- */
        #nebula-canvas {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 50% 50%, var(--nebula-core) 0%, var(--nebula-deep) 100%);
        }

        .nebula-cloud {
            position: absolute; border-radius: 50%;
            filter: blur(90px); opacity: 0.3;
            mix-blend-mode: screen;
            animation: drift linear infinite alternate;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 40px) scale(1.2); }
        }

        /* --- THE APERTURE CORE --- */
        .aperture-container {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 60vh; height: 60vh;
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .iris-ring {
            position: absolute; inset: 0;
            background: url('../assets/aperture-ring.png') center/contain no-repeat;
            z-index: 12; filter: drop-shadow(0 0 40px rgba(0,0,0,0.9));
        }

        .core-void {
            position: absolute; width: 68%; height: 68%;
            background: #000; border-radius: 50%;
            z-index: 5; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
        }

        .star-field { position: absolute; inset: 0; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: hyper-jump linear infinite;
        }

        @keyframes hyper-jump {
            from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            to { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
        }

        .q-core-asset {
            position: absolute; width: 45%; height: 45%;
            background: url('../assets/core-q.png') center/contain no-repeat;
            z-index: 15;
            filter: drop-shadow(0 0 25px var(--q-blue-glow));
            animation: subtle-pulse 4s ease-in-out infinite;
        }

        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 25px var(--q-blue-glow)); }
            50% { transform: scale(1.05); filter: brightness(1.2) drop-shadow(0 0 40px var(--q-blue-glow)); }
        }

        /* --- CENTER-ANCHORED CORNER ARMOR PANELS --- */
        .corner-panel {
            position: absolute; width: 340px; height: 80px;
            z-index: 20; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .panel-bg {
            position: absolute; inset: 0;
            background: url('../assets/panel-frame.png') center/100% 100% no-repeat;
            z-index: -1;
        }

        .tl { bottom: calc(50% + var(--corner-gap-y)); right: calc(50% + var(--corner-gap-x)); }
        .tr { bottom: calc(50% + var(--corner-gap-y)); left: calc(50% + var(--corner-gap-x)); }
        .tr .panel-bg { transform: scaleX(-1); }
        .bl { top: calc(50% + var(--corner-gap-y)); right: calc(50% + var(--corner-gap-x)); }
        .bl .panel-bg { transform: scaleY(-1); }
        .br { top: calc(50% + var(--corner-gap-y)); left: calc(50% + var(--corner-gap-x)); }
        .br .panel-bg { transform: scale(-1, -1); }

        .panel-label {
            height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; letter-spacing: 4px; font-weight: 700;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            position: relative; z-index: 2;
            box-sizing: border-box;
        }

        /* Asymmetrical Padding to repel text from the circular cutout */
        .tl .panel-label { padding-left: 55px; }
        .tr .panel-label { padding-right: 55px; }
        .bl .panel-label { padding-left: 55px; }
        .br .panel-label { padding-right: 55px; }

        /* --- CENTER-ANCHORED LATERAL WINGS --- */
        .wing-panel {
            position: absolute; width: 240px; height: 350px;
            z-index: 15; display: flex; flex-direction: column; justify-content: center;
            padding: 35px 20px; box-sizing: border-box; top: 50%;
            transform: translateY(-50%); text-align: center;
        }

        .wing-bg {
            position: absolute; inset: 0;
            background: url('../assets/wing-panel.png') center/100% 100% no-repeat;
            z-index: -1; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
        }

        .wing-l { right: calc(50% + var(--center-gap-x)); }
        .wing-r { left: calc(50% + var(--center-gap-x)); }
        .wing-r .wing-bg { transform: scaleX(-1); }

        /* --- CHRONO-FACE SYNC CLASSES --- */
        .w-head { font-family: 'Orbitron'; font-weight: 600; font-size: 0.75rem; letter-spacing: 3px; color: rgba(255,255,255,0.6); border-bottom: 1px solid var(--theme-dim); padding-bottom: 4px; margin-bottom: 8px; display: inline-block; z-index: 20;}
        .w-lbl { font-family: 'JetBrains Mono'; font-size: 0.55rem; color: var(--starlight); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; z-index: 20;}
        .val-lg { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; white-space: nowrap; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 20;}
        .val-sm { font-family: 'Orbitron'; font-size: 0.85rem; font-weight: 700; z-index: 20;}
        .fmt-toggle { font-family: 'JetBrains Mono'; font-weight: bold; font-size: 0.5rem; color: var(--micColor); cursor: pointer; border: 1px solid var(--micGlow); padding: 2px 8px; border-radius: 4px; background: rgba(0,0,0,0.6); pointer-events: auto; transition: 0.3s; white-space: nowrap; }

    </style>
</head>
<body>

    <div id="nebula-canvas"></div>

    <div class="corner-panel tl" onclick="location.href='../personal/'">
        <div class="panel-bg"></div>
        <div class="panel-label">PERSONAL QUAD</div>
    </div>
    
    <div class="corner-panel tr" onclick="location.href='../commercial/'">
        <div class="panel-bg"></div>
        <div class="panel-label">COMMERCIAL QUAD</div>
    </div>

    <div class="corner-panel bl" onclick="location.href='../physical/'">
        <div class="panel-bg"></div>
        <div class="panel-label">PHYSICAL ASSETS</div>
    </div>

    <div class="corner-panel br" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()">
        <div class="panel-bg"></div>
        <div class="panel-label">DASHBOARD</div>
    </div>

    <div class="wing-panel wing-l">
        <div class="wing-bg"></div>
        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom: 20px;">
            <span class="w-head">LEGACY OS</span>
            <div class="w-lbl">DATE</div>
            <div class="val-lg" id="leg-date" style="color: var(--micColor); text-shadow: 0 0 10px var(--micGlow);">--</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom: 20px;">
            <div style="display:flex; align-items:center; justify-content:center; gap: 5px;">
                <div class="w-lbl" style="margin:0;">TIME</div>
                <div class="fmt-toggle" onclick="window.toggleTimeFmt('fmt-btn')">UTC</div>
            </div>
            <div class="val-lg" id="leg-time" style="color: var(--micColor); text-shadow: 0 0 10px var(--micGlow);">--</div>
        </div>
        <div style="font-size:0.5rem; color:var(--starlight); margin-top:auto; border-top: 1px dashed var(--micGlow); padding-top: 8px; width: 85%; text-align:center; align-self: center;">STATUS: CONTINUITY ACTIVE</div>
    </div>

    <div class="aperture-container">
        <div class="core-void">
            <div class="star-field" id="star-field"></div>
        </div>
        <div class="iris-ring"></div>
        <div class="q-core-asset"></div>
    </div>

    <div class="wing-panel wing-r">
        <div class="wing-bg"></div>
        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom: 20px;">
            <span class="w-head">QUAD OS</span>
            <div class="w-lbl">Q COORDINATE</div>
            <div class="val-lg" id="q-coord-wing" style="margin-top: 4px; color: var(--micColor); text-shadow: 0 0 10px var(--micGlow);">--</div>
        </div>
        <div style="display:flex; width: 100%; justify-content: space-around; margin-bottom: 20px;">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="w-lbl">MEAN CIRCLE</div>
                <div class="val-sm" id="mean-deg" style="color:var(--micColor) !important; text-shadow:0 0 10px var(--micGlow); margin-top: 4px;">--</div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="w-lbl">TRUE ELLIPSE</div>
                <div class="val-sm" id="true-deg" style="color:var(--micColor) !important; text-shadow:0 0 10px var(--micGlow); margin-top: 4px;">--</div>
            </div>
        </div>
        <div style="font-size:0.5rem; color:var(--starlight); margin-top:auto; border-top: 1px dashed var(--micGlow); padding-top: 8px; width: 85%; text-align:center; align-self: center;">DUAL-STATE ENGINE</div>
    </div>

    <script>
        // --- DEEP SPACE NEBULA GENERATOR ---
        function initNebula() {
            const container = document.getElementById('nebula-canvas');
            const colors = ['rgba(15, 30, 60, 0.3)', 'rgba(5, 15, 30, 0.4)', 'rgba(20, 40, 80, 0.2)'];
            for(let i=0; i<10; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'nebula-cloud';
                cloud.style.width = Math.random() * 80 + 40 + 'vw';
                cloud.style.height = cloud.style.width;
                cloud.style.background = colors[Math.floor(Math.random() * colors.length)];
                cloud.style.left = Math.random() * 100 - 20 + 'vw';
                cloud.style.top = Math.random() * 100 - 20 + 'vh';
                cloud.style.animationDuration = Math.random() * 50 + 40 + 's';
                cloud.style.animationDelay = -Math.random() * 50 + 's';
                container.appendChild(cloud);
            }
        }

        // --- CORE STAR-FIELD INJECTION ---
        function initStars() {
            const field = document.getElementById('star-field');
            for(let i=0; i<200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 180 + 20;
                star.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                star.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                star.style.width = Math.random() * 2.5 + 0.5 + 'px';
                star.style.height = star.style.width;
                star.style.left = '50%';
                star.style.top = '50%';
                star.style.animationDuration = Math.random() * 4 + 1.5 + 's';
                star.style.animationDelay = -Math.random() * 5 + 's';
                field.appendChild(star);
            }
        }

        // --- TEMPORAL ENGINE SYNC (CHRONO-FACE FORMATTING LOGIC) ---
        window.addEventListener('q-tick', (e) => {
            const { t, qData, legacyDateStr, legacyTimeStr } = e.detail;

            // Dual Color Formatter for Letters vs Numbers
            function formatDualColor(str) {
                const letterStyle = "color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-right:2px;";
                const numStyle = "color:var(--theme-main); font-size:1.1rem; font-weight:bold;";
                let out = "";
                let tokens = str.match(/([0-9]+)|([^0-9]+)/g);
                if (tokens) {
                    tokens.forEach(tk => { out += `<span style="${/[0-9]/.test(tk) ? numStyle : letterStyle}">${tk}</span>`; });
                }
                return out;
            }
            
            // Legacy OS Wing Sync
            const legDateEl = document.getElementById('leg-date');
            if (legDateEl) legDateEl.innerHTML = `<span style="color:var(--theme-main); font-weight:bold; text-shadow:0 0 10px var(--theme-dim);">${legacyDateStr.toUpperCase()}</span>`;

            const legTimeEl = document.getElementById('leg-time');
            if (legTimeEl) legTimeEl.innerHTML = formatDualColor(legacyTimeStr);
            
            // Quad OS Wing Sync
            const meanDegEl = document.getElementById('mean-deg');
            if (meanDegEl) meanDegEl.innerText = qData.meanArc.toFixed(2) + "°";
            
            const trueDegEl = document.getElementById('true-deg');
            if (trueDegEl) trueDegEl.innerText = qData.trueArc.toFixed(2) + "°"; 

            let activeBlock = window.getQBlockByTime ? window.getQBlockByTime(t) : null;
            const qCoordWing = document.getElementById('q-coord-wing');
            
            if (qCoordWing) {
                if (activeBlock && activeBlock.type === 'PYLON') {
                    qCoordWing.innerHTML = `<span style="font-size:0.9rem; color:var(--theme-main); font-family:'Orbitron'; font-weight:bold;">${activeBlock.name}</span>`;
                } else {
                    qCoordWing.innerHTML = `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem;">QC</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${activeBlock ? activeBlock.cycle : 0}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">Q</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${qData.quad}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">S</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${qData.sect}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">DAY</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${qData.day}</span>`;
                }
            }
        });

        // External Format Toggle Hook
        window.toggleTimeFmt = function(btnId) {
            let fmt = localStorage.getItem('Q_TIME_FMT') || 'UTC_24';
            const cycle = { 'UTC_24': 'LOCAL_24', 'LOCAL_24': 'UTC_12', 'UTC_12': 'LOCAL_12', 'LOCAL_12': 'UTC_24' };
            let newFmt = cycle[fmt] || 'UTC_24';
            
            if (window.Q_UpdateState) window.Q_UpdateState('system_state', 'q_time_fmt', newFmt);
            else localStorage.setItem('Q_TIME_FMT', newFmt);
            
            document.querySelectorAll('.fmt-toggle').forEach(btn => {
                btn.innerText = newFmt.replace('_', ' ');
            });
            if (window.Q_MobileBridge) window.Q_MobileBridge.pulse('LIGHT');
        };

        initNebula();
        initStars();
    </script>
</body>
</html>
