<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>THE QUADRATURE // APERTURE GATEWAY</title>
    
    <script src="../q-ui-global.js?v=17.3.1"></script>
    <script src="../q-core.js?v=17.3.1"></script>
    <script src="../q-hub.js?v=17.3.1"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --q-blue-glow: rgba(0, 163, 255, 0.3);
            --q-metal: #e2e8f0;
            --nebula-deep: #050b14;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            background-color: var(--nebula-deep);
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: var(--q-metal);
            display: flex; justify-content: center; align-items: center;
        }

        /* --- LEGACY UI PURGE --- */
        #q-wing-left, #q-wing-right, .q-nav-bar, .q-control-strip, #mobile-telemetry-ribbon, #q-universal-controls {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* --- KINETIC NEBULA ENGINE --- */
        #nebula-canvas {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 50% 50%, #0a1628 0%, #050b14 100%);
        }

        .nebula-cloud {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.4;
            mix-blend-mode: screen;
            animation: drift linear infinite alternate;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.3); }
        }

        /* --- THE APERTURE CORE --- */
        .aperture-container {
            position: relative; width: 60vh; height: 60vh;
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .iris-ring {
            position: absolute; inset: 0;
            background: url('../assets/aperture-ring.png') center/contain no-repeat;
            z-index: 12; filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
        }

        .core-void {
            position: absolute; width: 52%; height: 52%;
            background: #000; border-radius: 50%;
            z-index: 5; overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        .star-field { position: absolute; inset: 0; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: hyper-jump linear infinite;
        }

        @keyframes hyper-jump {
            from { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            to { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
        }

        .q-core-asset {
            position: absolute; width: 40%; height: 40%;
            background: url('../assets/core-q.png') center/contain no-repeat;
            z-index: 15;
            filter: drop-shadow(0 0 20px var(--q-blue-glow));
            animation: subtle-pulse 4s ease-in-out infinite;
        }

        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 20px var(--q-blue-glow)); }
            50% { transform: scale(1.05); filter: brightness(1.2) drop-shadow(0 0 35px var(--q-blue-glow)); }
        }

        /* --- CORNER ARMOR PANELS (CALIBRATED TRIM) --- */
        .corner-panel {
            position: absolute; width: 250px; height: 75px;
            z-index: 20; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .panel-bg {
            position: absolute; inset: 0;
            background: url('../assets/panel-frame.png') center/100% 100% no-repeat;
            z-index: -1;
        }

        .tl { top: 3vh; left: 2vw; }
        .tr { top: 3vh; right: 2vw; }
        .tr .panel-bg { transform: scaleX(-1); }
        .bl { bottom: 3vh; left: 2vw; }
        .bl .panel-bg { transform: scaleY(-1); }
        .br { bottom: 3vh; right: 2vw; }
        .br .panel-bg { transform: scale(-1, -1); }

        .panel-label {
            height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; letter-spacing: 3px; font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative; z-index: 2;
        }

        /* --- LATERAL TELEMETRY WINGS (CALIBRATED TRIM) --- */
        .wing-panel {
            position: absolute; width: 200px; height: 320px;
            z-index: 15; display: flex; flex-direction: column;
            padding: 25px 15px; box-sizing: border-box;
        }

        .wing-bg {
            position: absolute; inset: 0;
            background: url('../assets/wing-panel.png') center/100% 100% no-repeat;
            z-index: -1;
        }

        .wing-l { left: 2vw; top: 50%; transform: translateY(-50%); }
        .wing-r { right: 2vw; top: 50%; transform: translateY(-50%); }
        .wing-r .wing-bg { transform: scaleX(-1); }

        .telemetry-row {
            margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px; position: relative; z-index: 2;
        }

        .tel-label { font-size: 0.6rem; color: rgba(226, 232, 240, 0.5); display: block; margin-bottom: 4px; }
        .tel-value { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: #fff; }

    </style>
</head>
<body>

    <div id="nebula-canvas"></div>

    <div class="corner-panel tl" onclick="location.href='../personal/'">
        <div class="panel-bg"></div>
        <div class="panel-label">PERSONAL QUAD</div>
    </div>
    
    <div class="corner-panel tr" onclick="location.href='../commercial/'">
        <div class="panel-bg"></div>
        <div class="panel-label">COMMERCIAL QUAD</div>
    </div>

    <div class="corner-panel bl" onclick="location.href='../physical/'">
        <div class="panel-bg"></div>
        <div class="panel-label">PHYSICAL ASSETS</div>
    </div>

    <div class="corner-panel br" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()">
        <div class="panel-bg"></div>
        <div class="panel-label">DASHBOARD</div>
    </div>

    <div class="wing-panel wing-l">
        <div class="wing-bg"></div>
        <div class="telemetry-row">
            <span class="tel-label">MEAN ARC</span>
            <span class="tel-value" id="val-mean">---.---°</span>
        </div>
        <div class="telemetry-row">
            <span class="tel-label">TRUE ELLIPSE</span>
            <span class="tel-value" id="val-true">---.---°</span>
        </div>
        <div class="telemetry-row">
            <span class="tel-label">SYSTEM CLOCK</span>
            <span class="tel-value" id="val-legacy">00:00:00</span>
        </div>
    </div>

    <div class="aperture-container">
        <div class="core-void">
            <div class="star-field" id="star-field"></div>
        </div>
        <div class="iris-ring"></div>
        <div class="q-core-asset"></div>
    </div>

    <div class="wing-panel wing-r">
        <div class="wing-bg"></div>
        <div class="telemetry-row">
            <span class="tel-label">QUADRANT</span>
            <span class="tel-value" id="val-quad">0.00</span>
        </div>
        <div class="telemetry-row">
            <span class="tel-label">SOLAR DAY</span>
            <span class="tel-value" id="val-day">000.000</span>
        </div>
        <div class="telemetry-row">
            <span class="tel-label">Q-CYCLE</span>
            <span class="tel-value" id="val-cycle">00</span>
        </div>
    </div>

    <script>
        // --- COSMIC NEBULA GENERATOR ---
        function initNebula() {
            const container = document.getElementById('nebula-canvas');
            const colors = ['rgba(41, 74, 122, 0.4)', 'rgba(30, 50, 80, 0.3)', 'rgba(10, 20, 40, 0.5)'];
            for(let i=0; i<8; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'nebula-cloud';
                cloud.style.width = Math.random() * 60 + 40 + 'vw';
                cloud.style.height = cloud.style.width;
                cloud.style.background = colors[Math.floor(Math.random() * colors.length)];
                cloud.style.left = Math.random() * 100 - 20 + 'vw';
                cloud.style.top = Math.random() * 100 - 20 + 'vh';
                cloud.style.animationDuration = Math.random() * 40 + 30 + 's';
                cloud.style.animationDelay = -Math.random() * 40 + 's';
                container.appendChild(cloud);
            }
        }

        // --- CORE STAR-FIELD INJECTION ---
        function initStars() {
            const field = document.getElementById('star-field');
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                star.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                star.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                star.style.width = Math.random() * 2 + 'px';
                star.style.height = star.style.width;
                star.style.left = '50%';
                star.style.top = '50%';
                star.style.animationDuration = Math.random() * 3 + 1 + 's';
                star.style.animationDelay = -Math.random() * 5 + 's';
                field.appendChild(star);
            }
        }

        // --- TEMPORAL ENGINE SYNC ---
        window.addEventListener('q-tick', (e) => {
            const { qData, legacyTimeStr } = e.detail;
            
            document.getElementById('val-mean').innerText = qData.meanArc.toFixed(3) + '°';
            document.getElementById('val-true').innerText = qData.trueArc.toFixed(3) + '°';
            document.getElementById('val-legacy').innerText = legacyTimeStr;
            document.getElementById('val-quad').innerText = qData.quad.toFixed(2);
            document.getElementById('val-day').innerText = qData.day.toFixed(3);
            document.getElementById('val-cycle').innerText = qData.cycle || '01';
        });

        initNebula();
        initStars();
    </script>
</body>
</html>
