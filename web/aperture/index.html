<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // APERTURE GATEWAY</title>
    
    <script src="../q-ui-global.js?v=16.4"></script>
    <script src="../q-core.js?v=16.4"></script>
    <script src="../q-ui-planner.js?v=16.4"></script>
    <script src="../q-hub.js?v=16.4"></script>
    
    <script>
        if (/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            document.documentElement.classList.add('is-mobile-device');
        }
        if(sessionStorage.getItem('Q_BOOT_COMPLETE') === 'true') {
            document.write('<style>#boot-overlay { display: none !important; }</style>');
            window.addEventListener('DOMContentLoaded', () => document.body.classList.remove('boot-active'));
        }
    </script>

    <style>
        /* Imported Cinzel Decorative for the engraved Q aesthetic */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Orbitron:wght@400;500;700;900&family=Cinzel+Decorative:wght@700;900&display=swap');

        /* ========================================================================= */
        /* --- APERTURE GATEWAY OVERRIDES: FROSTED ASYMMETRIC METALLIC ---           */
        /* ========================================================================= */

        /* 1. HIDE ALL NAVIGATION AND SCRUBBER PANELS */
        .q-nav-bar, .q-global-controls, #mobile-telemetry-ribbon, .q-control-strip, #q-mic-fab, #q-mic-fab-desktop {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* 2. VOID BACKGROUND (Grid Removed) */
        body {
            background-color: #000000 !important;
            background-image: none !important;
            margin: 0; height: 100dvh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* METALLIC CHROME GRADIENT DEFINITION */
        :root {
            --chrome-grad: linear-gradient(135deg, #ffffff 0%, #777777 25%, #222222 50%, #999999 75%, #ffffff 100%);
        }

        /* COSMIC DUST BACKGROUND LAYER */
        .cosmic-dust-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(20, 30, 45, 0.3) 0%, rgba(0, 0, 0, 0) 80%);
            z-index: 0;
            pointer-events: none;
        }
        .dust-mote {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            filter: blur(3px);
            animation: drift linear infinite;
        }
        @keyframes drift {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        /* 3. WING OVERRIDES (Frosted Glass & Asymmetric Metallic Borders) */
        .wing-content {
            background: linear-gradient(rgba(15, 20, 25, 0.4), rgba(15, 20, 25, 0.4)) padding-box, var(--chrome-grad) border-box !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-style: solid !important;
            border-color: transparent !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
            border-radius: 0 !important;
        }
        /* Asymmetric borders for the wings */
        .wing-left .wing-content { border-width: 1px 1px 1px 4px !important; }
        .wing-right .wing-content { border-width: 1px 4px 1px 1px !important; }
        
        .w-head, .v-head { border-bottom: 1px solid #555555 !important; color: #ffffff !important; text-shadow: none !important; }
        .val-lg, .q-val, .fmt-toggle, .val-sm, .t-row span, .w-lbl { color: #ffffff !important; text-shadow: none !important; }
        .fmt-toggle { border: 1px solid #ffffff !important; background: #000000 !important; }

        /* 4. THE 4 GATEWAY CORNERS (Frosted Glass & Asymmetric Metallic Borders) */
        .vector-anchor {
            position: absolute; 
            width: calc(320px + 50px); 
            height: 100px;
            z-index: 100; cursor: pointer; pointer-events: auto; 
            display: flex; justify-content: center; align-items: center; text-align: center;
            box-sizing: border-box; transition: all 0.3s ease; 
            background: linear-gradient(rgba(15, 20, 25, 0.4), rgba(15, 20, 25, 0.4)) padding-box, var(--chrome-grad) border-box !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-style: solid !important;
            border-color: transparent !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
            border-radius: 0 !important;
            backface-visibility: hidden;
        }
        .vector-anchor:hover {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3) !important;
        }
        
        /* Asymmetric border weights for corners */
        .tl { top: 7vh; left: 2vw; border-width: 3px 1px 1px 4px !important; border-radius: 6px 0 0 0 !important; }
        .tr { top: 7vh; right: 2vw; border-width: 3px 4px 1px 1px !important; border-radius: 0 6px 0 0 !important; }
        .bl { bottom: 8vh; left: 2vw; border-width: 1px 1px 3px 4px !important; border-radius: 0 0 0 6px !important; }
        .br { bottom: 8vh; right: 2vw; border-width: 1px 4px 3px 1px !important; border-radius: 0 0 6px 0 !important; }

        .gateway-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #ffffff;
        }

        /* 5. CENTER DIAL (Metallic Borders & Confined Starfield) */
        .aperture-dial {
            position: absolute; 
            width: 60vh; 
            height: 60vh; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            z-index: 30; 
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)) padding-box, var(--chrome-grad) border-box;
            border: 5px solid transparent; 
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
            overflow: hidden; 
        }

        #dense-star-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        /* 6. ENGRAVED, ROTATING "Q" */
        .mercury-q {
            font-family: 'Cinzel Decorative', serif;
            font-size: 28vh; 
            font-weight: 900; 
            background: var(--chrome-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.5); /* Inner engraved line */
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            animation: rotate-mercury 10s linear infinite;
            z-index: 10;
        }

        @keyframes rotate-mercury {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Kinetic Star CSS */
        .star-kinetic {
            position: absolute; top: 50%; left: 50%; width: 1.5px;
            height: calc(1.5px + (40px * var(--warp-factor, 0.5)));
            background: #ffffff;
            border-radius: 1px;
            animation: warp-travel linear infinite;
        }
        @keyframes warp-travel {
            0% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--radius)) translateZ(-300px); opacity: 0; }
            20% { opacity: var(--opacity); }
            80% { opacity: var(--opacity); }
            100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--radius)) translateZ(300px); opacity: 0; }
        }

    </style>
</head>
<body class="mode-q boot-active">

    <div class="cosmic-dust-layer" id="cosmic-dust"></div>

    <div class="vector-anchor tl" onclick="window.location.href='../personal/index.html'">
        <div class="gateway-title">PERSONAL QUAD</div>
    </div>
    
    <div class="vector-anchor tr" onclick="window.location.href='../commercial/index.html'">
        <div class="gateway-title">COMMERCIAL QUAD</div>
    </div>

    <div class="vector-anchor bl" onclick="window.location.href='../physical/index.html'">
        <div class="gateway-title">PHYSICAL ASSETS</div>
    </div>

    <div class="vector-anchor br" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()">
        <div class="gateway-title">DASHBOARD</div>
    </div>

    <div class="aperture-dial">
        <div id="dense-star-layer"></div>
        <div class="mercury-q">Q</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Generate Cosmic Dust Motes (Background)
            const dustLayer = document.getElementById('cosmic-dust');
            if(dustLayer) {
                for(let i=0; i<40; i++) {
                    let mote = document.createElement('div');
                    mote.className = 'dust-mote';
                    mote.style.width = (Math.random() * 4 + 2) + 'px';
                    mote.style.height = mote.style.width;
                    mote.style.left = (Math.random() * 100) + 'vw';
                    mote.style.top = (Math.random() * 100) + 'vh';
                    mote.style.animationDuration = (Math.random() * 10 + 10) + 's';
                    mote.style.animationDelay = -(Math.random() * 20) + 's';
                    dustLayer.appendChild(mote);
                }
            }

            // 2. Generate Confined Starfield (Inside Dial)
            const starContainer = document.getElementById('dense-star-layer');
            if(starContainer) {
                for(let i=0; i<900; i++) {
                    let star = document.createElement('div');
                    star.className = 'star-kinetic';
                    star.style.setProperty('--angle', Math.random() * 360 + 'deg');
                    star.style.setProperty('--radius', (Math.random() * 350) + 'px');
                    star.style.setProperty('--opacity', Math.random() * 0.9 + 0.1);
                    star.style.animationDuration = (Math.random() * 4 + 3) + 's';
                    star.style.animationDelay = -(Math.random() * 10) + 's';
                    starContainer.appendChild(star);
                }
            }
        });

        // 3. Restored Telemetry Listener for the Dynamic OS Wings
        window.addEventListener('q-tick', (e) => {
            const { t, qData, legacyDateStr, legacyTimeStr } = e.detail;

            function formatDualColor(str) {
                const letterStyle = "color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-right:2px;";
                const numStyle = "color:#ffffff; font-size:1.1rem; font-weight:bold;";
                let out = "";
                let tokens = str.match(/([0-9]+)|([^0-9]+)/g);
                if (tokens) {
                    tokens.forEach(tk => { out += `<span style="${/[0-9]/.test(tk) ? numStyle : letterStyle}">${tk}</span>`; });
                }
                return out;
            }

            const legDateEl = document.getElementById('leg-date');
            if (legDateEl) legDateEl.innerHTML = `<span style="color:#ffffff; font-weight:bold; text-shadow:0 0 10px rgba(255,255,255,0.3);">${legacyDateStr.toUpperCase()}</span>`;

            const legTimeEl = document.getElementById('leg-time');
            if (legTimeEl) legTimeEl.innerHTML = formatDualColor(legacyTimeStr);

            const meanDegEl = document.getElementById('mean-deg');
            if (meanDegEl) { meanDegEl.innerText = qData.meanArc.toFixed(2) + "°"; meanDegEl.style.setProperty('color', '#ffffff', 'important'); }
            
            const trueDegEl = document.getElementById('true-deg');
            if (trueDegEl) { trueDegEl.innerText = qData.trueArc.toFixed(2) + "°"; trueDegEl.style.setProperty('color', '#ffffff', 'important'); }

            let activeBlock = window.getQBlockByTime ? window.getQBlockByTime(t) : null;
            const qCoordWing = document.getElementById('q-coord-wing');
            
            if (qCoordWing) {
                if (activeBlock && activeBlock.type === 'PYLON') {
                    qCoordWing.innerHTML = `<span style="font-size:0.9rem; color:#ffffff; font-family:'Orbitron'; font-weight:bold;">${activeBlock.name}</span>`;
                } else {
                    qCoordWing.innerHTML = `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem;">QC</span><span style="color:#ffffff; font-size:1.1rem; font-weight:bold;">${activeBlock ? activeBlock.cycle : 0}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">Q</span><span style="color:#ffffff; font-size:1.1rem; font-weight:bold;">${qData.quad}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">S</span><span style="color:#ffffff; font-size:1.1rem; font-weight:bold;">${qData.sect}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">DAY</span><span style="color:#ffffff; font-size:1.1rem; font-weight:bold;">${qData.day}</span>`;
                }
            }
        });
    </script>
</body>
</html>
