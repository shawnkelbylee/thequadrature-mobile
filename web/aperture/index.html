<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>THE QUADRATURE // APERTURE GATEWAY</title>
    
    <script>
        // GATEWAY DIRECT OVERRIDE: Neutralize all initialization overlays injected by global scripts
        sessionStorage.setItem('Q_BOOT_COMPLETE', 'true');
        document.write('<style>#boot-overlay, .q-boot-overlay, #q-initialization-screen { display: none !important; opacity: 0 !important; pointer-events: none !important; }</style>');
    </script>

    <script src="../q-ui-global.js?v=17.4.4"></script>
    <script src="../q-core.js?v=17.4.4"></script>
    <script src="../q-hub.js?v=17.4.4"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --q-blue-glow: rgba(0, 163, 255, 0.3);
            --q-metal: #e2e8f0;
            --center-gap-x: 31vh;
            --corner-gap-y: 24vh;
            --corner-gap-x: 23vh;
            
            /* Chrono-Face Sync Variables */
            --theme-main: #00f0ff;
            --theme-dim: rgba(0, 240, 255, 0.2);
            --starlight: rgba(255, 255, 255, 0.6);
            --micColor: #00f0ff;
            --micGlow: rgba(0, 240, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            background-color: #010205; /* Deep void base */
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: var(--q-metal);
            display: flex; justify-content: center; align-items: center;
        }

        /* --- LEGACY UI PURGE --- */
        #q-wing-left, #q-wing-right, .q-nav-bar, .q-control-strip, #mobile-telemetry-ribbon, #q-universal-controls {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* --- GLOBAL TYPOGRAPHY --- */
        .global-header {
            position: absolute; top: 4vh; width: 100%; text-align: center;
            font-family: 'Courier New', Courier, monospace; font-weight: 900; font-size: 2.8rem; letter-spacing: 16px;
            color: #ffffff; z-index: 50; pointer-events: none;
            text-shadow: 0 0 15px rgba(0, 163, 255, 0.8), 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .global-footer {
            position: absolute; bottom: 6vh; width: 100%; text-align: center;
            font-family: 'Courier New', Courier, monospace; font-weight: 700; font-size: 1.4rem; letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.85); z-index: 50; pointer-events: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9), 0 0 10px rgba(0, 163, 255, 0.3);
        }

        /* --- IMMERSIVE COSMIC ENGINE (PHYSICAL ASSET INTEGRATION) --- */
        .space-bg {
            position: fixed; inset: 0; z-index: 0;
            background-image: radial-gradient(circle at 50% 50%, #030814 0%, #010205 100%);
        }

        /* Left Nebula Image Asset */
        .nebula-left {
            position: fixed; top: -10%; bottom: -10%; left: -10%; width: 55vw; z-index: 1;
            background: url('../assets/nebula-left.png') center/cover no-repeat;
            mix-blend-mode: screen; 
            animation: nebula-drift-l 35s ease-in-out infinite alternate;
            
            /* Radial Baffle */
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 0% 50%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%);
            mask-image: radial-gradient(ellipse 100% 100% at 0% 50%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%);
            pointer-events: none;
        }

        /* Right Nebula Image Asset */
        .nebula-right {
            position: fixed; top: -10%; bottom: -10%; right: -10%; width: 55vw; z-index: 1;
            background: url('../assets/nebula-right.png') center/cover no-repeat;
            mix-blend-mode: screen; 
            animation: nebula-drift-r 42s ease-in-out infinite alternate-reverse;
            
            /* Radial Baffle */
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 100% 50%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%);
            mask-image: radial-gradient(ellipse 100% 100% at 100% 50%, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%);
            pointer-events: none;
        }

        @keyframes nebula-drift-l {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            50% { transform: scale(1.05) translate(2%, 2%); opacity: 0.85; }
            100% { transform: scale(1.02) translate(-1%, -1%); opacity: 0.6; }
        }

        @keyframes nebula-drift-r {
            0% { transform: scale(1) translate(0, 0); opacity: 0.6; }
            50% { transform: scale(1.05) translate(-2%, 2%); opacity: 0.9; }
            100% { transform: scale(1.02) translate(1%, -1%); opacity: 0.55; }
        }
        
        .dust-layer-global {
            position: fixed; inset: 0; z-index: 2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.012' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise2)' opacity='0.08'/%3E%3C/svg%3E");
            mix-blend-mode: screen;
            pointer-events: none;
        }

        /* --- THE APERTURE CORE --- */
        .aperture-container {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 60vh; height: 60vh;
            z-index: 10; display: flex; justify-content: center; align-items: center;
        }

        .iris-ring {
            position: absolute; inset: 0;
            background: url('../assets/aperture-ring.png') center/contain no-repeat;
            z-index: 12; filter: drop-shadow(0 0 40px rgba(0,0,0,0.9));
        }

        .core-void {
            position: absolute; width: 68%; height: 68%;
            background: #000; border-radius: 50%;
            z-index: 5; overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
        }

        .star-field { position: absolute; inset: 0; z-index: 3; pointer-events: none;}
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            /* Animations assigned dynamically via JS */
        }

        /* Velocity curve handled by cubic-bezier in JS */
        @keyframes hyper-jump {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            5% { opacity: var(--max-op, 1); }
            95% { opacity: var(--max-op, 1); }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.2); opacity: 0; }
        }

        /* Decoupled Twinkle Engine */
        @keyframes twinkle {
            0% { filter: brightness(1) drop-shadow(0 0 2px rgba(255,255,255,0.8)); }
            100% { filter: brightness(0.15) drop-shadow(0 0 0px transparent); }
        }

        .q-core-asset {
            position: absolute; width: 45%; height: 45%;
            left: 53%; top: 52%; 
            transform: translate(-50%, -50%);
            background: url('../assets/core-q.png') center/contain no-repeat;
            z-index: 15;
            filter: drop-shadow(0 0 25px var(--q-blue-glow));
            animation: subtle-pulse 4s ease-in-out infinite;
        }

        @keyframes subtle-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: brightness(1) drop-shadow(0 0 25px var(--q-blue-glow)); }
            50% { transform: translate(-50%, -50%) scale(1.05); filter: brightness(1.2) drop-shadow(0 0 40px var(--q-blue-glow)); }
        }

        /* --- CENTER-ANCHORED CORNER ARMOR PANELS --- */
        .corner-panel {
            position: absolute; width: 340px; height: 80px;
            z-index: 20; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .corner-panel:hover {
            transform: translate(var(--tx-hover), var(--ty-hover)) scale(1.03);
        }

        .frost-zone {
            position: absolute; inset: 6px 12px; 
            background: rgba(15, 20, 35, 0.5);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 6px; z-index: -2;
            box-shadow: inset 0 0 20px rgba(0, 163, 255, 0.15);
            transition: 0.3s ease;
        }

        .corner-panel:hover .frost-zone {
            background: rgba(20, 25, 45, 0.65);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4), inset 0 0 25px rgba(255, 255, 255, 0.1);
        }

        .panel-bg {
            position: absolute; inset: 0;
            background: url('../assets/panel-frame.png') center/100% 100% no-repeat;
            z-index: -1; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6));
        }

        .tl { bottom: calc(50% + var(--corner-gap-y)); right: calc(50% + var(--corner-gap-x)); --tx-hover: -2px; --ty-hover: -2px;}
        .tr { bottom: calc(50% + var(--corner-gap-y)); left: calc(50% + var(--corner-gap-x)); --tx-hover: 2px; --ty-hover: -2px;}
        .tr .panel-bg { transform: scaleX(-1); }
        .bl { top: calc(50% + var(--corner-gap-y)); right: calc(50% + var(--corner-gap-x)); --tx-hover: -2px; --ty-hover: 2px;}
        .bl .panel-bg { transform: scaleY(-1); }
        .br { top: calc(50% + var(--corner-gap-y)); left: calc(50% + var(--corner-gap-x)); --tx-hover: 2px; --ty-hover: 2px;}
        .br .panel-bg { transform: scale(-1, -1); }

        .panel-label {
            height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; letter-spacing: 4px; font-weight: 700;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.4);
            position: relative; z-index: 2;
            box-sizing: border-box;
        }

        .tl .panel-label { padding-left: 55px; }
        .tr .panel-label { padding-right: 55px; }
        .bl .panel-label { padding-left: 55px; }
        .br .panel-label { padding-right: 55px; }

        /* --- OS WING PANELS --- */
        .wing-panel {
            position: absolute; width: 240px; height: 250px; 
            z-index: 15; box-sizing: border-box; top: 50%;
            transform: translateY(-50%); text-align: center;
        }

        .wing-frost {
            position: absolute; inset: 12px;
            background: rgba(10, 15, 25, 0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-radius: 8px; z-index: -2;
            box-shadow: inset 0 0 30px rgba(0, 163, 255, 0.2);
        }

        .wing-bg {
            position: absolute; inset: 0;
            background: url('../assets/wing-panel.png') center/100% 100% no-repeat;
            z-index: -1; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
        }

        .wing-l { right: calc(50% + var(--center-gap-x)); }
        .wing-r { left: calc(50% + var(--center-gap-x)); }
        .wing-r .wing-bg { transform: scaleX(-1); }

        .wing-header {
            position: absolute; top: 25px; left: 0; width: 100%; z-index: 10;
        }
        
        .wing-data-center {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100%; width: 100%; padding: 40px 0; box-sizing: border-box; position: relative; z-index: 10;
        }

        .wing-footer {
            position: absolute; bottom: 20px; left: 0; width: 100%; z-index: 10;
        }

        /* --- CHRONO-FACE SYNC CLASSES --- */
        .w-head { font-family: 'Orbitron'; font-weight: 600; font-size: 0.75rem; letter-spacing: 3px; color: rgba(255,255,255,0.6); border-bottom: 1px solid var(--theme-dim); padding-bottom: 4px; display: inline-block; z-index: 20;}
        .w-lbl { font-family: 'JetBrains Mono'; font-size: 0.55rem; color: var(--starlight); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; z-index: 20;}
        .val-lg { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; white-space: nowrap; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 20;}
        .val-sm { font-family: 'Orbitron'; font-size: 0.85rem; font-weight: 700; z-index: 20;}
        .fmt-toggle { font-family: 'JetBrains Mono'; font-weight: bold; font-size: 0.5rem; color: var(--micColor); cursor: pointer; border: 1px solid var(--micGlow); padding: 2px 8px; border-radius: 4px; background: rgba(0,0,0,0.6); pointer-events: auto; transition: 0.3s; white-space: nowrap; }

    </style>
</head>
<body>

    <div class="space-bg"></div>
    
    <div class="nebula-left"></div>
    <div class="nebula-right"></div>
    
    <div class="dust-layer-global"></div>

    <div class="global-header">THE QUADRATURE</div>
    <div class="global-footer">BASED IN SCIENCE BATHED IN CULTURE AND BUILT FOR THE DIGITAL AGE</div>

    <div class="corner-panel tl" onclick="location.href='../personal/'">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="panel-label">PERSONAL QUAD</div>
    </div>
    
    <div class="corner-panel tr" onclick="location.href='../commercial/'">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="panel-label">COMMERCIAL QUAD</div>
    </div>

    <div class="corner-panel bl" onclick="location.href='../physical/'">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="panel-label">PHYSICAL ASSETS</div>
    </div>

    <div class="corner-panel br" onclick="if(window.Q_IntegrationHub) window.Q_IntegrationHub.openHub()">
        <div class="frost-zone"></div>
        <div class="panel-bg"></div>
        <div class="panel-label">DASHBOARD</div>
    </div>

    <div class="wing-panel wing-l">
        <div class="wing-frost"></div>
        <div class="wing-bg"></div>
        
        <div class="wing-header">
            <span class="w-head">LEGACY OS</span>
        </div>
        
        <div class="wing-data-center">
            <div style="margin-bottom: 15px;">
                <div class="w-lbl">DATE</div>
                <div class="val-lg" id="ap-leg-date" style="color: var(--micColor); text-shadow: 0 0 10px var(--micGlow);">--</div>
            </div>
            <div>
                <div style="display:flex; align-items:center; justify-content:center; gap: 5px;">
                    <div class="w-lbl" style="margin:0;">TIME</div>
                    <div class="fmt-toggle" onclick="window.toggleTimeFmt('fmt-btn')">UTC</div>
                </div>
                <div class="val-lg" id="ap-leg-time" style="color: var(--micColor); text-shadow: 0 0 10px var(--micGlow);">--</div>
            </div>
        </div>

        <div class="wing-footer">
            <div style="font-size:0.5rem; color:var(--starlight); border-top: 1px dashed var(--micGlow); padding-top: 8px; width: 85%; margin: 0 auto;">STATUS: CONTINUITY ACTIVE</div>
        </div>
    </div>

    <div class="aperture-container">
        <div class="core-void">
            <div class="star-field" id="core-star-field"></div>
        </div>
        <div class="iris-ring"></div>
        <div class="q-core-asset"></div>
    </div>

    <div class="wing-panel wing-r">
        <div class="wing-frost"></div>
        <div class="wing-bg"></div>
        
        <div class="wing-header">
            <span class="w-head">QUAD OS</span>
        </div>

        <div class="wing-data-center">
            <div style="margin-bottom: 15px;">
                <div class="w-lbl">Q COORDINATE</div>
                <div class="val-lg" id="ap-q-coord" style="margin-top: 4px; color: var(--micColor); text-shadow: 0 0 10px var(--micGlow);">--</div>
            </div>
            <div style="display:flex; width: 100%; justify-content: space-around;">
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <div class="w-lbl">MEAN CIRCLE</div>
                    <div class="val-sm" id="ap-mean-deg" style="color:var(--micColor) !important; text-shadow:0 0 10px var(--micGlow); margin-top: 4px;">--</div>
                </div>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <div class="w-lbl">TRUE ELLIPSE</div>
                    <div class="val-sm" id="ap-true-deg" style="color:var(--micColor) !important; text-shadow:0 0 10px var(--micGlow); margin-top: 4px;">--</div>
                </div>
            </div>
        </div>

        <div class="wing-footer">
            <div style="font-size:0.5rem; color:var(--starlight); border-top: 1px dashed var(--micGlow); padding-top: 8px; width: 85%; margin: 0 auto;">DUAL-STATE ENGINE</div>
        </div>
    </div>

    <script>
        function initStars() {
            const coreField = document.getElementById('core-star-field');
            
            // Core Stars (Density maximized to 450 with extreme origin clustering)
            for(let i=0; i<450; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const angle = Math.random() * Math.PI * 2;
                
                // Travel exactly to the edge of the void
                const dist = Math.random() * 4 + 21; 
                star.style.setProperty('--tx', Math.cos(angle) * dist + 'vh');
                star.style.setProperty('--ty', Math.sin(angle) * dist + 'vh');
                
                // Expanded size variance: microscopic dust (0.3) to massive foreground (3.5)
                let size = (Math.random() > 0.85) ? (Math.random() * 2.5 + 1.0) : (Math.random() * 1.2 + 0.3);
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.left = '50%';
                star.style.top = '50%';
                
                // Drift Timing: Aggressive cubic-bezier ensures they linger at the origin before accelerating
                let speedBase = (size > 1.5) ? 8 : 12; 
                let driftDur = Math.random() * 8 + speedBase;
                let driftDel = -Math.random() * 20;
                
                // Decoupled Twinkle Timing
                let twinkDur = Math.random() * 1.5 + 0.5;
                let twinkDel = -Math.random() * 2;
                
                star.style.setProperty('--max-op', (size > 1.5) ? (Math.random() * 0.3 + 0.7) : (Math.random() * 0.5 + 0.2));
                
                // Dual-Animation Execution
                star.style.animation = `hyper-jump ${driftDur}s ${driftDel}s cubic-bezier(0.5, 0.0, 1, 1) infinite, twinkle ${twinkDur}s ${twinkDel}s ease-in-out infinite alternate`;
                
                coreField.appendChild(star);
            }
        }

        window.addEventListener('q-tick', (e) => {
            const { t, qData, legacyDateStr, legacyTimeStr } = e.detail;

            function formatDualColor(str) {
                const letterStyle = "color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-right:2px;";
                const numStyle = "color:var(--theme-main); font-size:1.1rem; font-weight:bold;";
                let out = "";
                let tokens = str.match(/([0-9]+)|([^0-9]+)/g);
                if (tokens) {
                    tokens.forEach(tk => { out += `<span style="${/[0-9]/.test(tk) ? numStyle : letterStyle}">${tk}</span>`; });
                }
                return out;
            }
            
            const legDateEl = document.getElementById('ap-leg-date');
            if (legDateEl) legDateEl.innerHTML = `<span style="color:var(--theme-main); font-weight:bold; text-shadow:0 0 10px var(--theme-dim);">${legacyDateStr.toUpperCase()}</span>`;

            const legTimeEl = document.getElementById('ap-leg-time');
            if (legTimeEl) legTimeEl.innerHTML = formatDualColor(legacyTimeStr);
            
            const meanDegEl = document.getElementById('ap-mean-deg');
            if (meanDegEl) meanDegEl.innerText = qData.meanArc.toFixed(4) + "°";
            
            const trueDegEl = document.getElementById('ap-true-deg');
            if (trueDegEl) trueDegEl.innerText = qData.trueArc.toFixed(4) + "°"; 

            let activeBlock = window.getQBlockByTime ? window.getQBlockByTime(t) : null;
            const qCoordWing = document.getElementById('ap-q-coord');
            
            if (qCoordWing) {
                if (activeBlock && activeBlock.type === 'PYLON') {
                    qCoordWing.innerHTML = `<span style="font-size:0.9rem; color:var(--theme-main); font-family:'Orbitron'; font-weight:bold;">${activeBlock.name}</span>`;
                } else {
                    qCoordWing.innerHTML = `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem;">QC</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${activeBlock ? activeBlock.cycle : 0}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">Q</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${qData.quad}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">S</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${qData.sect}</span> ` +
                                           `<span style="color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-left:6px;">DAY</span><span style="color:var(--theme-main); font-size:1.1rem; font-weight:bold;">${qData.day}</span>`;
                }
            }
        });

        window.toggleTimeFmt = function(btnId) {
            let fmt = localStorage.getItem('Q_TIME_FMT') || 'UTC_24';
            const cycle = { 'UTC_24': 'LOCAL_24', 'LOCAL_24': 'UTC_12', 'UTC_12': 'LOCAL_12', 'LOCAL_12': 'UTC_24' };
            let newFmt = cycle[fmt] || 'UTC_24';
            
            if (window.Q_UpdateState) window.Q_UpdateState('system_state', 'q_time_fmt', newFmt);
            else localStorage.setItem('Q_TIME_FMT', newFmt);
            
            document.querySelectorAll('.fmt-toggle').forEach(btn => {
                btn.innerText = newFmt.replace('_', ' ');
            });
            if (window.Q_MobileBridge) window.Q_MobileBridge.pulse('LIGHT');
        };

        initStars();
    </script>
</body>
</html>
