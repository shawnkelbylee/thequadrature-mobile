<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // WORKFORCE RESONANCE (BIO)</title>
    
    <script src="./q-ui-global.js?v=23.0"></script>
    <script src="../q-core.js?v=23.0"></script>
    <script src="../q-ui-planner.js?v=23.0"></script>
    <script src="../q-hub.js?v=23.0"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --white: #ffffff;
            --q-metal: #888888;
            --glass-liquid: rgba(10, 10, 10, 0.85);
            --blur-high: blur(20px);
        }

        /* --- Monochrome Corporate Corner Panels --- */
        .v-head {
            position: absolute; white-space: nowrap;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px;
            margin: 0; padding: 0; z-index: 25; color: var(--white);
            width: 280px; left: 50%; transform: translateX(-50%);
        }
        
        .tl .v-head { bottom: -8px; text-align: right; }
        .tr .v-head { bottom: -8px; text-align: left; }
        .bl .v-head { top: -8px; text-align: right; }
        .br .v-head { top: -8px; text-align: left; }

        .panel-data-container {
            height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: center;
            position: relative; z-index: 2; box-sizing: border-box; padding: 20px 30px;
        }

        .t-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 8px; font-size: 0.6rem; font-family: 'JetBrains Mono'; font-weight: 700; align-items: center;}
        .t-row span:first-child { color: var(--q-metal); }
        .val-sm { font-family: 'Orbitron'; font-weight: 700; font-size: 0.8rem; color: var(--white); text-shadow: 0 0 8px rgba(255,255,255,0.2); }

        /* --- Center Dial Architecture --- */
        .gear-container {
            position: absolute; width: var(--dial-size, 60vh); height: var(--dial-size, 60vh); border-radius: 50%;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; z-index: 30;
            background: var(--glass-liquid); backdrop-filter: var(--blur-high); -webkit-backdrop-filter: var(--blur-high);
            border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="mode-q">

    <div class="gear-container q-center-dial" id="q-center-dial"></div>

    <div class="corner-panel tl telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">ULTRADIAN RHYTHM</div>
            <div class="t-row"><span>PHASE:</span> <span id="bio-phase" class="val-sm">--</span></div>
            <div class="t-row"><span>DURATION:</span> <span id="bio-dur" class="val-sm">90 MIN</span></div>
        </div>
    </div>

    <div class="corner-panel tr telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">AUTONOMIC TONE</div>
            <div class="t-row"><span>HRV ELASTICITY:</span> <span id="bio-hrv" class="val-sm">--</span></div>
            <div class="t-row"><span>RESTING HR:</span> <span id="bio-rhr" class="val-sm">--</span></div>
        </div>
    </div>

    <div class="corner-panel bl telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">ENVIRONMENTAL ANCHOR</div>
            <div class="t-row"><span>SOLAR NOON:</span> <span id="bio-noon" class="val-sm">--</span></div>
            <div class="t-row"><span>LUNAR ILLUM:</span> <span id="bio-lunar" class="val-sm">--</span></div>
        </div>
    </div>

    <div class="corner-panel br telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">RECOVERY METRICS</div>
            <div class="t-row"><span>SLEEP STAGE:</span> <span id="bio-sleep" class="val-sm">--</span></div>
            <div class="t-row"><span>GRAV TIDE:</span> <span id="bio-tide" class="val-sm">--</span></div>
        </div>
    </div>

    <script>
        window.addEventListener('q-tick', (e) => {
            const { t, qData } = e.detail;
            
            // Core Biological Math Abstraction
            let anchorMins = parseInt(localStorage.getItem('q_bio_anchor')) || 0; 
            let cycleDuration = parseInt(localStorage.getItem('q_bio_duration')) || 90; 
            let activeMs = ((t % 86400000) - (anchorMins * 60000) + 86400000) % 86400000;
            let cyclePosFloat = (activeMs % (cycleDuration * 60000)) / (cycleDuration * 60000);
            
            const getEl = (id) => document.getElementById(id);

            // Populate Corporate Panels
            if(getEl('bio-phase')) getEl('bio-phase').innerText = (cyclePosFloat >= 0.22 && cyclePosFloat < 0.77) ? "DEEP FLOW" : "RECOVERY";
            if(getEl('bio-hrv')) getEl('bio-hrv').innerText = (65 + Math.cos(t / 15000) * 10).toFixed(1) + " MS";
            if(getEl('bio-lunar')) getEl('bio-lunar').innerText = (qData.lunarPhase > 0.5 ? (1 - qData.lunarPhase) * 200 : qData.lunarPhase * 200).toFixed(1) + '%';
            if(getEl('bio-tide')) getEl('bio-tide').innerText = (qData.lunarPhase < 0.05 || qData.lunarPhase > 0.95 || (qData.lunarPhase > 0.45 && qData.lunarPhase < 0.55)) ? "HIGH" : "NOMINAL";
            if(getEl('bio-rhr')) getEl('bio-rhr').innerText = (55 + Math.sin(t / 10000) * 5).toFixed(1) + " BPM";
            if(getEl('bio-sleep')) getEl('bio-sleep').innerText = (cyclePosFloat >= 0.22 && cyclePosFloat < 0.77) ? "DEEP" : "LIGHT/REM";
            if(getEl('bio-noon')) getEl('bio-noon').innerText = "T-" + (12 - new Date(t).getUTCHours()) + "H";
        });
    </script>
</body>
</html>
