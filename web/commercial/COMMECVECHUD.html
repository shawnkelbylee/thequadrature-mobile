<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // YIELD METROLOGY (MEC)</title>
    
    <script src="./q-ui-global.js?v=23.0"></script>
    <script src="../q-core.js?v=23.0"></script>
    <script src="../q-ui-planner.js?v=23.0"></script>
    <script src="../q-hub.js?v=23.0"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --white: #ffffff;
            --q-metal: #888888;
            --glass-liquid: rgba(10, 10, 10, 0.85);
            --blur-high: blur(20px);
        }

        /* --- Monochrome Corporate Corner Panels --- */
        .v-head {
            position: absolute; white-space: nowrap;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px;
            margin: 0; padding: 0; z-index: 25; color: var(--white);
            width: 280px; left: 50%; transform: translateX(-50%);
        }
        
        .tl .v-head { bottom: -8px; text-align: right; }
        .tr .v-head { bottom: -8px; text-align: left; }
        .bl .v-head { top: -8px; text-align: right; }
        .br .v-head { top: -8px; text-align: left; }

        .panel-data-container {
            height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: center;
            position: relative; z-index: 2; box-sizing: border-box; padding: 20px 30px; gap: 4px;
        }

        .t-row { display: flex; justify-content: space-between; width: 100%; margin-bottom: 4px; font-size: 0.6rem; font-family: 'JetBrains Mono'; font-weight: 700; align-items: center;}
        .t-row span:first-child { color: var(--q-metal); }
        .val-sm { font-family: 'Orbitron'; font-weight: 700; font-size: 0.8rem; color: var(--white); text-shadow: 0 0 8px rgba(255,255,255,0.2); text-align: right; }

        /* --- Center Dial Architecture --- */
        .gear-container {
            position: absolute; width: var(--dial-size, 60vh); height: var(--dial-size, 60vh); border-radius: 50%;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; z-index: 30;
            background: var(--glass-liquid); backdrop-filter: var(--blur-high); -webkit-backdrop-filter: var(--blur-high);
            border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="mode-q">

    <div class="gear-container q-center-dial" id="q-center-dial"></div>

    <div class="corner-panel tl telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">ORBITAL DRIFT</div>
            <div class="t-row"><span>DRIFT TO PYLON:</span> <span id="face-MEC-DRIFT" class="val-sm">--</span></div>
        </div>
    </div>

    <div class="corner-panel tr telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">ORBITAL ECCENTRICITY</div>
            <div class="t-row"><span>ECCENTRICITY:</span> <span id="face-MEC-ECCENTRICITY" class="val-sm">--</span></div>
        </div>
    </div>

    <div class="corner-panel bl telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">TEMPORAL SYMMETRY</div>
            <div class="t-row"><span>SYMMETRY LOSS:</span> <span id="face-MEC-SYMMETRY" class="val-sm">--</span></div>
        </div>
    </div>

    <div class="corner-panel br telemetry-node desktop-only">
        <div class="frost-zone"></div>
        <div class="panel-data-container">
            <div class="v-head">KEPLERIAN KINEMATICS</div>
            <div class="t-row"><span>SMEAR (GREGORIAN):</span> <span id="face-MEC-SMEAR" class="val-sm">--</span></div>
            <div class="t-row"><span>VELOCITY:</span> <span id="face-MEC-VELOCITY" class="val-sm">--</span></div>
        </div>
    </div>

    <script>
        window.addEventListener('q-tick', (e) => {
            const { t, qData } = e.detail;
            
            const getEl = (id) => document.getElementById(id);

            // Yield Metrology (MEC) Data Math
            let driftDeg = qData.trueArc < 90 ? 90 - qData.trueArc : qData.trueArc < 180 ? 180 - qData.trueArc : qData.trueArc < 270 ? 270 - qData.trueArc : 360 - qData.trueArc;
            
            if(getEl('face-MEC-DRIFT')) getEl('face-MEC-DRIFT').innerText = driftDeg.toFixed(2) + "° REM";
            if(getEl('face-MEC-SYMMETRY')) getEl('face-MEC-SYMMETRY').innerText = (Math.abs(qData.delta) / 180 * 100).toFixed(2) + "%";
            if(getEl('face-MEC-SMEAR')) getEl('face-MEC-SMEAR').innerText = ((t - (Math.round(t / 1000) * 1000)) / 1000).toFixed(6);
            if(getEl('face-MEC-ECCENTRICITY')) getEl('face-MEC-ECCENTRICITY').innerText = "0.0167";
            if(getEl('face-MEC-VELOCITY')) getEl('face-MEC-VELOCITY').innerText = (1 + 0.0334 * Math.cos((qData.trueArc - 14) * Math.PI / 180)).toFixed(3) + "x";
        });
    </script>
</body>
</html>
