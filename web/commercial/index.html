<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // COMMERCIAL CHRONO-FACE</title>
    
    <script src="./q-ui-global.js?v=23.2"></script>
    <script src="../q-core.js?v=23.2"></script>
    <script src="../q-ui-planner.js?v=23.2"></script>
    <script src="../q-hub.js?v=23.2"></script>
    
    <script>
        if (/Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            document.documentElement.classList.add('is-mobile-device');
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --void: #030303; 
            --white: #ffffff; 
            --silver-glow: rgba(255, 255, 255, 0.15);
            --glass-liquid: rgba(10, 10, 10, 0.85); 
            --blur-high: blur(20px);
            --q-metal: #888888;
        }

        .v-head { 
            position: absolute; white-space: nowrap;
            font-family: 'JetBrains Mono'; font-weight: 700; font-size: 0.75rem; letter-spacing: 2px; 
            margin: 0; padding: 0; z-index: 25; width: 280px; 
            left: 50%; transform: translateX(-50%);
            color: var(--white) !important;
        }
        
        #quad-BIO .v-head { bottom: -8px; text-align: right; }
        #quad-COM .v-head { bottom: -8px; text-align: left; }
        #quad-ENV .v-head { top: -8px; text-align: right; }
        #quad-MEC .v-head { top: -8px; text-align: left; }

        .t-row { display: flex; justify-content: space-between; width: 280px; margin: 0 auto 3px auto; font-size: 0.55rem; font-family: 'JetBrains Mono'; font-weight: 700; align-items: center;}
        .t-row span:first-child { color: var(--q-metal); text-align: left; }

        .val-sm { font-family: 'Orbitron'; font-weight: 700; font-size: 0.6rem; z-index: 20; text-align: right; color: var(--white) !important; }

        .gear-container {
            position: absolute; width: var(--dial-size); height: var(--dial-size); border-radius: 50%; 
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center; z-index: 30;
            background: var(--glass-liquid); backdrop-filter: var(--blur-high); -webkit-backdrop-filter: var(--blur-high);
            border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="mode-q">

    <div class="gear-container q-center-dial" id="local-chrono-dial">
        <svg width="100%" height="100%" viewBox="0 0 400 400" id="chrono-svg">
            <circle cx="200" cy="200" r="180" fill="none" stroke="#333" stroke-width="2"/>
            <circle cx="200" cy="200" r="160" fill="none" stroke="#111" stroke-width="10"/>
            <g id="chrono-ticks"></g>
            <line id="hand-hour" x1="200" y1="200" x2="200" y2="120" stroke="#888" stroke-width="6" stroke-linecap="round"/>
            <line id="hand-minute" x1="200" y1="200" x2="200" y2="60" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
            <line id="hand-second" x1="200" y1="200" x2="200" y2="40" stroke="#555" stroke-width="2" stroke-linecap="round"/>
            <circle cx="200" cy="200" r="8" fill="#ffffff"/>
        </svg>
    </div>

    <script>
        const VECTOR_METRICS = {
            'BIO': { HRV: 'HRV / Elasticity', PHASE: 'Ultradian Phase', LUNAR: 'Lunar Illumination', TIDE: 'Gravitational Tide' },
            'COM': { NEXT: 'Next Civil Anchor', ZODIAC: 'Astrophysical Aspect', LEDGER: 'Sovereign Ledger', TERM: 'Solar Season' },
            'ENV': { FRICTION: 'Thermodynamic Friction', RISK: 'Probability Index', TENSION: 'Biome Tension', GEO: 'Local Coordinate' },
            'MEC': { DRIFT: 'Drift to Pylon', ECCENTRICITY: 'Orbital Eccentricity', SYMMETRY: 'Temporal Symmetry Loss', SMEAR: 'Gregorian Smear' }
        };

        const V_STYLES = { 'BIO': 'WORKFORCE', 'COM': 'LEDGER', 'ENV': 'INFRASTRUCTURE', 'MEC': 'YIELD' };

        window.refreshChronoFace = function() {
            ['BIO', 'COM', 'ENV', 'MEC'].forEach(vec => {
                const container = document.getElementById(`quad-${vec}`);
                if (!container) return; 
                let inner = `<div class="v-head">${V_STYLES[vec]}</div>`;
                for(let i=1; i<=4; i++) {
                    const slotKey = localStorage.getItem(`Q_COM_SLOT_${vec}_${i}`) || 'NONE';
                    if(slotKey !== 'NONE') {
                        inner += `<div class="t-row"><span>${VECTOR_METRICS[vec][slotKey].toUpperCase()}:</span> <span id="face-${vec}-${slotKey}" class="val-sm">--</span></div>`;
                    }
                }
                container.innerHTML = inner;
            });
        };

        const ticks = document.getElementById('chrono-ticks');
        for(let i=0; i<60; i++) {
            const isHour = i % 5 === 0;
            const angle = (i * 6 - 90) * Math.PI / 180;
            const rInner = isHour ? 160 : 165;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", 200 + rInner * Math.cos(angle));
            line.setAttribute("y1", 200 + rInner * Math.sin(angle));
            line.setAttribute("x2", 200 + 175 * Math.cos(angle));
            line.setAttribute("y2", 200 + 175 * Math.sin(angle));
            line.setAttribute("stroke", isHour ? "#ffffff" : "#333");
            line.setAttribute("stroke-width", isHour ? "3" : "1");
            ticks.appendChild(line);
        }

        window.addEventListener('q-tick', (e) => {
            const d = new Date();
            const h = d.getHours(); const m = d.getMinutes(); const s = d.getSeconds();
            document.getElementById('hand-hour').setAttribute("transform", `rotate(${((h % 12) + m/60) * 30} 200 200)`);
            document.getElementById('hand-minute').setAttribute("transform", `rotate(${(m + s/60) * 6} 200 200)`);
            document.getElementById('hand-second').setAttribute("transform", `rotate(${s * 6} 200 200)`);

            const { t, qData } = e.detail;
            const getEl = (id) => document.getElementById(id);

            // Populate Restored Metric Logic
            if(getEl('face-BIO-HRV')) getEl('face-BIO-HRV').innerText = (65 + Math.cos(t / 15000) * 10).toFixed(1) + " MS";
            if(getEl('face-BIO-PHASE')) getEl('face-BIO-PHASE').innerText = (window.getBiologicalState && window.getBiologicalState(t)) || "--";
            if(getEl('face-BIO-LUNAR')) getEl('face-BIO-LUNAR').innerText = (qData.lunarPhase * 100).toFixed(1) + "%";
            if(getEl('face-BIO-TIDE')) getEl('face-BIO-TIDE').innerText = qData.lunarPhase < 0.1 || qData.lunarPhase > 0.9 ? "SPRING" : "NEAP";

            if(getEl('face-COM-LEDGER')) getEl('face-COM-LEDGER').innerText = `Q${qData.quad} CHECKPOINT`;
            if(getEl('face-COM-TERM')) getEl('face-COM-TERM').innerText = `SECTOR ${qData.sect}`;

            if(getEl('face-ENV-FRICTION')) getEl('face-ENV-FRICTION').innerText = Math.abs(qData.delta * 2).toFixed(2) + " ΔT";
            if(getEl('face-ENV-RISK')) getEl('face-ENV-RISK').innerText = Math.floor(Math.abs(qData.delta) * 5) + "%";

            if(getEl('face-MEC-DRIFT')) getEl('face-MEC-DRIFT').innerText = qData.delta.toFixed(4) + "°";
            if(getEl('face-MEC-SMEAR')) getEl('face-MEC-SMEAR').innerText = (t % 1000 / 1000).toFixed(4);
        });

        window.addEventListener('DOMContentLoaded', () => {
            window.refreshChronoFace();
        });
    </script>
</body>
</html>
