<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // COMMUNAL VECTOR</title>
    <script src="./q-ui-global.js?v=22.0"></script>
    <script src="../q-core.js?v=22.0"></script>
    <script src="../q-ui-planner.js?v=22.0"></script>
    <script src="../q-hub.js?v=22.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=JetBrains+Mono:wght@100;400;700&display=swap');

        :root {
            --void: #050301; --gold-bright: #ffd700; --gold-dim: rgba(255, 215, 0, 0.15);
            --brass: #c5b358; --copper: #b87333; 
            --active-glow: rgba(255, 215, 0, 0.3);
            --theme-main: var(--gold-bright); --theme-dim: var(--gold-dim);
            --starlight: rgba(255, 255, 255, 0.6);
            --platinum: #E5E4E2;
        }

        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            background-color: var(--void); 
            background: radial-gradient(circle at center, #1a1205 0%, var(--void) 85%); 
            color: var(--gold-bright); font-family: 'Orbitron', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            user-select: none; perspective: 1500px; transform-style: preserve-3d; color-scheme: dark; 
            touch-action: manipulation;
        }

        /* --- HAPTIC & MODAL Z-INDEX OVERRIDES --- */
        #q-universal-modal { z-index: 999999 !important; }

        /* Headers bound strictly to the 280px text wrapper edge, shifted outwards by 1 character (8px) */
        .v-head { 
            position: absolute; white-space: nowrap;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; 
            margin: 0; padding: 0; z-index: 25; border: none;
            color: var(--theme-main);
            text-shadow: 0 0 10px var(--theme-dim);
            transition: color 0.3s, text-shadow 0.3s;
        }
        
        /* Top Panels: Headers tight BELOW the frame */
        #quad-BIO .v-head { bottom: -16px; right: 0; text-align: right; transform: translateX(8px); }
        #quad-COM .v-head { bottom: -16px; left: 0; text-align: left; transform: translateX(-8px); }
        
        /* Bottom Panels: Headers tight ABOVE the frame */
        #quad-ENV .v-head { top: -16px; right: 0; text-align: right; transform: translateX(8px); }
        #quad-MEC .v-head { top: -16px; left: 0; text-align: left; transform: translateX(-8px); }

        /* Override global OPT positioning for the OPT Tags to center them in the frame rings */
        .tl .opt-oval { left: 35px !important; top: 42px !important; font-size: 0.45rem !important; pointer-events: auto !important; letter-spacing: 1px !important; }
        .tr .opt-oval { right: 35px !important; top: 42px !important; font-size: 0.45rem !important; pointer-events: auto !important; letter-spacing: 1px !important; }
        .bl .opt-oval { left: 35px !important; bottom: 42px !important; font-size: 0.45rem !important; pointer-events: auto !important; letter-spacing: 1px !important; }
        .br .opt-oval { right: 35px !important; bottom: 42px !important; font-size: 0.45rem !important; pointer-events: auto !important; letter-spacing: 1px !important; }

        /* The Imaginary Rectangle: Expanded width pushes left text left and right text right */
        .t-row { display: flex; justify-content: space-between; width: 100%; font-size: 0.55rem; font-family: 'JetBrains Mono'; font-weight: 700; align-items: center;}
        
        /* Pure White Descriptors for Maximum Readability */
        .t-row span:first-child { color: #ffffff; text-shadow: 0 0 5px rgba(255,255,255,0.4); text-align: left; flex-shrink: 0; text-transform: uppercase; }

        .val-sm { font-family: 'Orbitron'; font-weight: 700; font-size: 0.6rem; z-index: 20; text-align: right; white-space: nowrap; color: var(--theme-main); text-shadow: 0 0 10px var(--theme-dim); text-transform: uppercase; }

        .panel-data-wrapper { position: relative; width: 280px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 2px; margin: 0 auto; cursor: pointer; z-index: 20; }

        .opt-btn { font-size: 0.6rem; font-weight: bold; color: var(--gold-bright); background: rgba(0,0,0,0.6); border: 1px solid var(--gold-bright); padding: 3px 12px; border-radius: 4px; cursor: pointer; box-shadow: 0 0 8px var(--gold-dim); transition: 0.3s; margin-top: auto; font-family: 'Orbitron'; }
        .opt-btn:hover { background: var(--gold-bright); color: var(--void); box-shadow: 0 0 15px var(--gold-bright); }
        .opt-btn.active { background: var(--gold-dim); border-color: var(--gold-bright); color: #fff; }

        .astrolabe { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: var(--dial-size); height: var(--dial-size); max-width: 600px; max-height: 600px; display: flex; justify-content: center; align-items: center; z-index: 60; pointer-events: none; }
        .ring { position: absolute; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid var(--gold-dim); box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        .ring-outer { width: 100%; height: 100%; border: 3px solid var(--brass); box-shadow: 0 0 40px var(--gold-dim); background: rgba(255, 215, 0, 0.02); }
        .ring-dynamic { width: 70%; height: 70%; border: 2px dashed var(--brass); }
        .ring-inner { width: 40%; height: 40%; border: 2px solid var(--gold-bright); background: radial-gradient(circle, rgba(200, 150, 50, 0.05) 0%, rgba(0,0,0,0.8) 100%); box-shadow: inset 0 0 20px var(--brass); }
        .node-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; pointer-events: none; }

        .cusp-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 38; transform-origin: center center; }
        .cusp-line { position: absolute; top: 50%; left: 70%; width: 15%; height: 0; border-top: 1px dashed rgba(255, 215, 0, 0.35); transform: translateY(-50%); box-shadow: 0 0 5px rgba(255, 215, 0, 0.1); }

        .zodiac-glyph { position: absolute; font-family: Arial, sans-serif; color: var(--platinum); font-size: 1.8rem; display: flex; justify-content: center; align-items: center; width: 30px; height: 30px; margin-top: -15px; margin-left: -15px; background: transparent !important; opacity: 0.4; transition: 0.3s; pointer-events: auto; cursor: pointer; }
        .zodiac-glyph:hover { color: #fff; text-shadow: 0 0 20px #fff; transform: scale(1.5); opacity: 1; z-index: 70; }
        .zodiac-glyph.natal-active { color: var(--gold-bright); text-shadow: 0 0 15px var(--gold-bright); opacity: 1; font-weight: bold; transform: scale(1.3); }
        .zodiac-glyph.natal-active:hover { color: #fff; text-shadow: 0 0 25px var(--gold-bright); transform: scale(1.6); }
        
        .origin-node { position: absolute; width: 14px; height: 14px; background: var(--gold-bright); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); box-shadow: 0 0 20px var(--gold-bright); z-index: 25; margin-top: -7px; margin-left: -7px; filter: drop-shadow(0 0 8px var(--gold-bright)); pointer-events: none; }

        .event-node { position: absolute; width: 22px; height: 22px; border-radius: 50%; margin-top: -11px; margin-left: -11px; cursor: pointer; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; z-index: 30; font-size: 0.8rem; font-family: sans-serif; background: var(--void); border: 1px solid transparent; pointer-events: auto; }
        .node-jud { color: var(--gold-bright); border-color: rgba(255,215,0,0.3); box-shadow: inset 0 0 10px rgba(255,215,0,0.2); }
        .node-isl { color: var(--platinum); border-color: rgba(229,228,226,0.3); box-shadow: inset 0 0 10px rgba(229,228,226,0.2); }
        .node-chr { color: var(--copper); border-color: rgba(184,115,51,0.3); box-shadow: inset 0 0 10px rgba(184,115,51,0.2); }
        .node-civ { color: #4cc9f0; border-color: rgba(76,201,240,0.3); box-shadow: inset 0 0 10px rgba(76,201,240,0.2); }
        .node-hin { color: #ff9933; border-color: rgba(255,153,51,0.3); box-shadow: inset 0 0 10px rgba(255,153,51,0.2); }
        .node-bud { color: #f4c430; border-color: rgba(244,196,48,0.3); box-shadow: inset 0 0 10px rgba(244,196,48,0.2); }
        .node-tao { color: #ffffff; border-color: rgba(255,255,255,0.3); box-shadow: inset 0 0 10px rgba(255,255,255,0.2); }
        .node-hol { color: #ff66b2; border-color: rgba(255,102,178,0.3); box-shadow: inset 0 0 10px rgba(255,102,178,0.2); }
        .node-sys { color: #00f0ff; border-color: rgba(0,240,255,0.3); box-shadow: inset 0 0 10px rgba(0,240,255,0.2); }
        .node-cluster { color: #000; background: var(--gold-bright); border-color: var(--gold-bright); box-shadow: 0 0 15px var(--gold-bright); font-weight: 900; font-family:'JetBrains Mono'; }
        .node-pyl { color: var(--gold-bright); border-color: var(--gold-bright); box-shadow: inset 0 0 10px var(--gold-dim); font-size: 1rem; z-index: 32; }

        .event-label { position: absolute; font-family: 'JetBrains Mono'; font-size: 0.6rem; width: auto; white-space: nowrap; text-align: center; margin-top: 25px; transition: 0.3s; opacity: 0; font-weight: 700; color: var(--platinum); text-shadow: 0 0 8px #000, 0 0 15px var(--brass); background: rgba(0,0,0,0.8); border: 1px solid rgba(255,215,0,0.3); padding: 4px 8px; border-radius: 4px; pointer-events: none; z-index: 50; }
        .event-node:hover { transform: scale(1.6); border-color: #fff; box-shadow: 0 0 25px #fff; z-index: 60; }
        .event-node.flare { transform: scale(1.4); border-color: #fff; box-shadow: 0 0 20px #fff; z-index: 40; }
        .event-node:hover + .event-label { opacity: 1; transform: scale(1.1); z-index: 60; color: #fff; border-color: #fff; }
        .term-marker { position: absolute; width: 4px; height: 16px; background: var(--copper); margin-top: -8px; margin-left: -2px; z-index: 20; pointer-events: auto; }
        .transit-arm { position: absolute; width: 100%; height: 100%; z-index: 35; pointer-events: none; transition: transform 0.1s linear; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 30px solid var(--gold-bright); filter: drop-shadow(0 5px 10px var(--gold-bright)); }

        .center-star { position: absolute; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; z-index: 10; pointer-events: none; }
        .star-layer { position: absolute; width: 100%; height: 100%; background: var(--gold-bright); clip-path: polygon(50% 0%, 52% 48%, 100% 50%, 52% 52%, 50% 100%, 48% 52%, 0% 50%, 48% 48%); }
        .layer-1 { animation: glitter-1 0.7s infinite; } .layer-2 { background: var(--platinum); animation: glitter-2 0.9s infinite; } .layer-3 { animation: glitter-3 1.1s infinite; } .layer-4 { background: var(--platinum); animation: glitter-4 0.8s infinite; }

        @keyframes glitter-1 { 0%, 100% { opacity: 1; transform: rotate(0deg) scale(1); filter: drop-shadow(0 0 10px var(--gold-bright)); } 50% { opacity: 0.6; transform: rotate(0deg) scale(0.85); filter: drop-shadow(0 0 5px var(--gold-dim)); } }
        @keyframes glitter-2 { 0%, 100% { opacity: 0.5; transform: rotate(22.5deg) scale(0.85); filter: drop-shadow(0 0 5px var(--platinum)); } 50% { opacity: 1; transform: rotate(22.5deg) scale(1.05); filter: drop-shadow(0 0 15px var(--platinum)); } }
        @keyframes glitter-3 { 0%, 100% { opacity: 1; transform: rotate(45deg) scale(0.95); filter: drop-shadow(0 0 12px var(--gold-bright)); } 50% { opacity: 0.4; transform: rotate(45deg) scale(0.8); filter: drop-shadow(0 0 3px var(--gold-dim)); } }
        @keyframes glitter-4 { 0%, 100% { opacity: 0.4; transform: rotate(67.5deg) scale(0.8); filter: drop-shadow(0 0 10px var(--platinum)); } 50% { opacity: 0.9; transform: rotate(67.5deg) scale(1); filter: drop-shadow(0 0 10px var(--platinum)); } }
    </style>
</head>
<body class="mode-q">

    <div class="star-container" id="stars"></div>

    <div class="astrolabe q-center-dial">
        <div class="ring ring-outer"></div>
        <div class="ring ring-dynamic" id="dynamic-ring"></div>
        <div class="ring ring-inner">
            <div class="center-star">
                <div class="star-layer layer-1"></div>
                <div class="star-layer layer-2"></div>
                <div class="star-layer layer-3"></div>
                <div class="star-layer layer-4"></div>
            </div>
        </div>
        <div class="node-layer" id="node-layer"></div>
        <div class="transit-arm" id="transit-arm">
            <div class="pointer"></div>
        </div>
    </div>

    <script>
        let currentMode = 'zod'; 
        let activeTermName = "";
        let currentRenderedYear = -1;

        let activeFaiths = ['jud', 'isl', 'chr', 'hin', 'bud', 'tao'];
        let activeCivil = true;
        let activeIntrospection = true;
        let activeZodiac = localStorage.getItem('q_zodiac_visible') !== 'false';

        let activeHolidays = true;
        let activePylons = true;
        let activeSys = true;
        
        let ISL_DB = [];
        let SYS_DB = [ { name: "Tax Day (US)", coord: 113.4, type: 'node-sys', glyph: '$' } ];
        
        window.injectVectorData = function() {
            document.querySelectorAll('.opt-oval').forEach((el, index) => {
                el.innerText = 'OPT';
                el.style.setProperty('color', 'var(--gold-bright)', 'important');
                el.style.setProperty('text-shadow', '0 0 8px var(--gold-dim)', 'important');
                
                let target = '';
                if(index === 0) target = 'rel';
                if(index === 1) target = 'zod';
                if(index === 2) target = 'civ';
                if(index === 3) target = 'int';
                
                el.onclick = (e) => { e.stopPropagation(); openOptions(e, target); };
            });

            const quadBIO = document.getElementById('quad-BIO');
            if (quadBIO) {
                quadBIO.innerHTML = `
                    <div id="wrapper-rel" class="panel-data-wrapper" onclick="setMode('rel')">
                        <div class="v-head">RELIGIOUS OVERLAY</div>
                        <div class="t-row"><span>SUB-SET:</span> <span id="rel-active" class="val-sm">MULTI-FAITH</span></div>
                        <div class="t-row"><span>NEXT:</span> <span id="rel-next" class="val-sm">--</span></div>
                    </div>
                `;
            }

            const quadCOM = document.getElementById('quad-COM');
            if (quadCOM) {
                quadCOM.innerHTML = `
                    <div id="wrapper-zod" class="panel-data-wrapper" onclick="setMode('zod')">
                        <div class="v-head">ZODIACAL TRANSIT</div>
                        <div class="t-row"><span>HOUSE:</span> <span id="zod-house" class="val-sm">--</span></div>
                        <div class="t-row"><span>PHASE:</span> <span id="zod-phase" class="val-sm">--</span></div>
                    </div>
                `;
            }

            const quadENV = document.getElementById('quad-ENV');
            if (quadENV) {
                quadENV.innerHTML = `
                    <div id="wrapper-civ" class="panel-data-wrapper" onclick="setMode('civ')">
                        <div class="v-head">CIVIL ANCHOR</div>
                        <div class="t-row"><span>LOCALE:</span> <span id="civ-active" class="val-sm">US (STATIC)</span></div>
                        <div class="t-row"><span>NEXT:</span> <span id="civ-next" class="val-sm">--</span></div>
                    </div>
                `;
            }

            const quadMEC = document.getElementById('quad-MEC');
            if (quadMEC) {
                quadMEC.innerHTML = `
                    <div id="wrapper-int" class="panel-data-wrapper" onclick="setMode('int')">
                        <div class="v-head">INTROSPECTION</div>
                        <div class="t-row"><span>JIÉQÌ:</span> <span id="int-term" class="val-sm">--</span></div>
                        <div class="t-row"><span>GROWTH ARC:</span> <span id="int-pct" class="val-sm">--%</span></div>
                    </div>
                `;
            }
            
            setMode(currentMode);
        };

        function initLocalHUD() {
            const checkExist = setInterval(function() {
                if (document.getElementById('quad-BIO')) {
                    clearInterval(checkExist);
                    if (window.injectVectorData) window.injectVectorData();
                }
            }, 50);
            setTimeout(() => clearInterval(checkExist), 5000);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLocalHUD);
        } else {
            initLocalHUD();
        }
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.panel-data-wrapper').forEach(el => {
                const head = el.querySelector('.v-head');
                if(head) {
                    head.style.color = 'var(--brass)';
                    head.style.textShadow = 'none';
                }
            });
            const activeEl = document.getElementById(`wrapper-${mode}`);
            if(activeEl) {
                const head = activeEl.querySelector('.v-head');
                if(head) {
                    head.style.color = 'var(--gold-bright)';
                    head.style.textShadow = '0 0 10px var(--gold-bright)';
                }
            }
        }

        function toggleVisibility(type, btn) {
            if(type === 'hol') { activeHolidays = !activeHolidays; btn.classList.toggle('active', activeHolidays); }
            if(type === 'pyl') { activePylons = !activePylons; btn.classList.toggle('active', activePylons); }
            if(type === 'sys') { activeSys = !activeSys; btn.classList.toggle('active', activeSys); }
            renderDynamicRing();
        }

        function recalculateDynamicHolidays(year) {
            if (!window.PYLON_ALPHA_DYNAMIC) return;
            const yearDiff = year - 2026;
            const shiftDays = yearDiff * -10.87; 
            
            const ramadanTime = new Date(Date.UTC(2026, 1, 18, 12, 0, 0)).getTime() + (shiftDays * window.MS_DAY);
            const fitrTime = new Date(Date.UTC(2026, 2, 20, 12, 0, 0)).getTime() + (shiftDays * window.MS_DAY);
            const adhaTime = new Date(Date.UTC(2026, 4, 27, 12, 0, 0)).getTime() + (shiftDays * window.MS_DAY);

            ISL_DB = [
                { name: "Ramadan Begins", time: ramadanTime, type: 'node-isl', glyph: '☪' },
                { name: "Eid al-Fitr", time: fitrTime, type: 'node-isl', glyph: '☪' },
                { name: "Eid al-Adha", time: adhaTime, type: 'node-isl', glyph: '☪' }
            ];

            ISL_DB.forEach(ev => {
                let diff = ev.time - window.PYLON_ALPHA_DYNAMIC;
                let days = diff / window.MS_DAY;
                ev.coord = window.getOrbitalData(days).meanArc;
            });
        }

        function applyFanning(nodes) {
            let isMobile = window.innerWidth <= 768;
            let windowSize = isMobile ? 5.0 : 3.5; 
            let list = nodes.map(n => ({...n, renderCoord: n.coord}));
            list.sort((a,b) => a.coord - b.coord);
            
            let clusters = []; let currentCluster = [];
            for(let i=0; i<list.length; i++) {
                if(currentCluster.length === 0) currentCluster.push(list[i]);
                else {
                    let diff = list[i].coord - currentCluster[currentCluster.length-1].coord;
                    if(diff < windowSize) currentCluster.push(list[i]);
                    else { clusters.push(currentCluster); currentCluster = [list[i]]; }
                }
            }
            if(currentCluster.length > 0) clusters.push(currentCluster);

            let result = [];
            clusters.forEach(c => {
                if(c.length > 1 && isMobile) {
                    result.push({
                        isCluster: true,
                        coord: c[0].coord,
                        renderCoord: c[0].coord,
                        events: c,
                        type: 'node-cluster',
                        glyph: c.length,
                        name: 'CONCURRENT EVENTS'
                    });
                } else if (c.length > 1) {
                    let sines = 0, cosines = 0;
                    c.forEach(n => { sines += Math.sin(n.coord * Math.PI / 180); cosines += Math.cos(n.coord * Math.PI / 180); });
                    let avgRad = Math.atan2(sines / c.length, cosines / c.length);
                    let avgDeg = (avgRad * 180 / Math.PI + 360) % 360;
                    
                    let startAngle = avgDeg - ((c.length - 1) * windowSize / 2);
                    c.forEach((n, idx) => { 
                        n.renderCoord = (startAngle + (idx * windowSize) + 360) % 360; 
                        result.push(n);
                    });
                } else {
                    let n = c[0];
                    n.renderCoord = n.coord;
                    result.push(n);
                }
            });
            return result;
        }

        window.TEMP_CLUSTER_EVENTS = [];
        function openClusterModal(clusterEvent) {
            window.TEMP_CLUSTER_EVENTS = clusterEvent.events;
            let html = `<div style="font-size:0.65rem; color:var(--platinum); margin-bottom:15px; text-align:center; line-height: 1.4;">Multiple observances detected within a tightly bound orbital arc. Select a specific node to view telemetry.</div>`;
            html += `<div style="display:flex; flex-direction:column; gap:8px; max-height: 50vh; overflow-y: auto;">`;
            
            clusterEvent.events.forEach((ev, i) => {
                let colorStr = ev.type.includes('jud') ? 'var(--gold-bright)' : ev.type.includes('chr') ? 'var(--copper)' : ev.type.includes('isl') ? 'var(--platinum)' : ev.type.includes('sys') ? '#00f0ff' : '#fff';
                html += `<button style="background:rgba(0,0,0,0.6); border:1px solid ${colorStr}; color:${colorStr}; font-family:'Orbitron'; font-size:0.7rem; padding:12px; border-radius:4px; display:flex; justify-content:space-between; cursor:pointer;" onclick="window.Q_ModalEngine.close(); setTimeout(() => openNodeModal(window.TEMP_CLUSTER_EVENTS[${i}]), 300)">
                    <span>${ev.glyph || ''} ${ev.name.toUpperCase()}</span>
                    <span style="font-family:'JetBrains Mono'; opacity:0.8;">${ev.coord.toFixed(1)}°</span>
                </button>`;
            });
            
            html += `</div>`;
            window.Q_ModalEngine.render(`CONCURRENT OBSERVANCES`, html, 'CLOSE');
        }

        function renderNodes(renderedList, parentLayer, radius) {
            renderedList.forEach((event) => {
                let node = document.createElement('div');
                node.className = `event-node ${event.type}`; 
                node.dataset.coord = event.coord; 
                if(event.glyph) node.innerHTML = event.isCluster ? `<span style="font-size:0.65rem; color:#000; font-family:'JetBrains Mono';">+${event.glyph}</span>` : event.glyph;
                
                let angle = (event.renderCoord - 90) * (Math.PI / 180); 
                let x = 50 + radius * Math.cos(angle); let y = 50 + radius * Math.sin(angle);
                node.style.left = `${x}%`; node.style.top = `${y}%`;
                
                if (event.isCluster) {
                    node.onclick = (e) => { e.stopPropagation(); openClusterModal(event); };
                } else {
                    node.onclick = (e) => { e.stopPropagation(); openNodeModal(event); };
                }
                
                let label = document.createElement('div'); label.className = 'event-label'; label.innerText = event.name.toUpperCase();
                let lx = 50 + (radius + 8) * Math.cos(angle); let ly = 50 + (radius + 8) * Math.sin(angle);
                label.style.left = `calc(${lx}% - 60px)`; label.style.top = `calc(${ly}% - 10px)`;
                parentLayer.appendChild(node); parentLayer.appendChild(label);
            });
        }

        function renderDynamicRing() {
            if(!window.PYLON_ALPHA_DYNAMIC || !window.Q_REGISTRY) return; 
            const nodeLayer = document.getElementById('node-layer');
            nodeLayer.innerHTML = ''; 
            
            if (activeZodiac) {

        function syncToPlanner(absoluteTimeMs, prefix, content) {
            if(!window.PYLON_ALPHA_DYNAMIC || !absoluteTimeMs) return; 
            const pDate = new Date(absoluteTimeMs);
            const y = pDate.getFullYear();
            const mo = (pDate.getMonth()+1).toString().padStart(2,'0');
            const d = pDate.getDate().toString().padStart(2,'0');
            
            const key = `${y}-${mo}-${d}-12-00`; 

            window.loadPlannerData();
            if(!window.qData[key]) window.qData[key] = { text: "", link: "" };

            if(content.trim() !== "") {
                window.qData[key].text = `[${prefix}] ${content}`;
            } else {
                if (window.qData[key].text.startsWith(`[${prefix}]`)) {
                    window.qData[key].text = "";
                }
            }
            window.savePlannerData();
            window.dispatchEvent(new Event('storage'));
        }

            }
            
            const trueArc = qData.trueArc;
            const meanArc = qData.meanArc;
            
            const continuousMeanDeg = daysElapsed * (360 / 365.24219);
            document.getElementById('transit-arm').style.transform = `rotate(${continuousMeanDeg + qData.delta}deg)`;
            
            document.querySelectorAll('.event-node').forEach(node => {
                let nodeDeg = parseFloat(node.dataset.coord); let dist = Math.abs(nodeDeg - trueArc); if (dist > 180) dist = 360 - dist; 
                if (dist < 5.0) { node.classList.add('flare'); } else { node.classList.remove('flare'); }
            });

            let combinedRel = []; 
            activeFaiths.forEach(f => { 
                if(f === 'isl') combinedRel = combinedRel.concat(ISL_DB);
                else if(window.Q_REGISTRY.REL_DB[f]) combinedRel = combinedRel.concat(window.Q_REGISTRY.REL_DB[f]); 
            }); 
            combinedRel.sort((a,b)=>a.coord-b.coord);
            
            let nextRel = getNextEvent(trueArc, combinedRel);
            document.getElementById('rel-next').innerText = nextRel ? `${nextRel.name.substring(0,8).toUpperCase()}.. (${nextRel.coord.toFixed(1)}°)` : "--";

            const zodiacNames = ["CAPRICORN", "AQUARIUS", "PISCES", "ARIES", "TAURUS", "GEMINI", "CANCER", "LEO", "VIRGO", "LIBRA", "SCORPIO", "SAGITTARIUS"];
            const savedAnchor = window.Q_STATE?.metaphysical_layer?.natal_anchor || 'NONE';
            document.getElementById('zod-house').innerText = savedAnchor !== 'NONE' ? savedAnchor : "UNASSIGNED";
            
            if (savedAnchor !== 'NONE') {
                let natalIndex = zodiacNames.indexOf(savedAnchor);
                let currentIndex = Math.floor(trueArc / 30);
                let diff = Math.abs(currentIndex - natalIndex);
                if (diff > 6) diff = 12 - diff; 
                
                let aspect = "";
                if (diff === 0) aspect = "CONJUNCTION (0°)";
                else if (diff === 1) aspect = "SEMI-SEXTILE (30°)";
                else if (diff === 2) aspect = "SEXTILE (60°)";
                else if (diff === 3) aspect = "SQUARE (90°)";
                else if (diff === 4) aspect = "TRINE (120°)";
                else if (diff === 5) aspect = "QUINCUNX (150°)";
                else if (diff === 6) aspect = "OPPOSITION (180°)";
                document.getElementById('zod-phase').innerText = aspect;
            } else {
                document.getElementById('zod-phase').innerText = "PENDING CALIBRATION";
            }

            let globalCiv = window.getGlobalHolidays(currentRenderedYear).filter(e => e.type === 'node-civ');
            let nextCiv = getNextEvent(trueArc, globalCiv.concat(SYS_DB));
            document.getElementById('civ-next').innerText = nextCiv ? `${nextCiv.name.substring(0,10).toUpperCase()}.. (${nextCiv.coord.toFixed(1)}°)` : "--";

            const termIndex = Math.floor(trueArc / 15); const activeTerm = window.Q_REGISTRY.SOLAR_TERMS[termIndex]; activeTermName = activeTerm.name; const termProgress = ((trueArc - activeTerm.start) / 15) * 100;
            document.getElementById('int-term').innerText = activeTermName.substring(0,10).toUpperCase(); document.getElementById('int-pct').innerText = `${termProgress.toFixed(1)}% REALIZED`;
        });

        if (window.generateStars) window.generateStars('stars'); 
    </script>
</body>
</html>
