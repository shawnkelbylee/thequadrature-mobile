<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // ENVIRONMENTAL VECTOR</title>
    <script src="./q-ui-global.js?v=22.4"></script>
<script src="../q-core.js?v=22.4"></script>
<script src="../q-ui-planner.js?v=22.4"></script>
<script src="../q-hub.js?v=22.4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=JetBrains+Mono:wght@100;400;700&display=swap');

        :root {
            --void: #020617; 
            --atmos-blue: #0ea5e9; 
            --atmos-dim: rgba(14, 165, 233, 0.15);
            --squall-amber: #f59e0b; 
            --alert-red: #ef4444; 
            --perihelion-mag: #c026d3;
            --env-green: #a7ff83; 
            --env-green-dim: rgba(167, 255, 131, 0.2); 
            --env-green-glow: rgba(167, 255, 131, 0.4);
            --theme-main: var(--env-green); 
            --theme-dim: var(--env-green-dim); 
            --gold: #F4D068;
            --platinum: #E5E4E2;
            --white-pure: #ffffff;
            --starlight: rgba(255, 255, 255, 0.6);
        }

        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            background-color: var(--void); 
            background: radial-gradient(circle at center, #0a1122 0%, var(--void) 100%); 
            color: var(--env-green); font-family: 'JetBrains Mono', monospace; 
            display: flex; justify-content: center; align-items: center; 
            user-select: none; perspective: 1500px; transform-style: preserve-3d; color-scheme: dark; 
            touch-action: manipulation;
        }

        #q-universal-modal { z-index: 999999 !important; }

        /* Headers bound strictly to the 280px text wrapper edge, shifted outwards by 1 character (8px) */
        .v-head { 
            position: absolute; white-space: nowrap;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; 
            margin: 0; padding: 0; z-index: 25; border: none;
            color: var(--theme-main);
            text-shadow: 0 0 10px var(--theme-dim);
            transition: color 0.3s, text-shadow 0.3s;
        }
        
        /* Top Panels: Headers tight BELOW the frame */
        #quad-BIO .v-head { bottom: -16px; right: 0; text-align: right; transform: translateX(8px); }
        #quad-COM .v-head { bottom: -16px; left: 0; text-align: left; transform: translateX(-8px); }
        
        /* Bottom Panels: Headers tight ABOVE the frame */
        #quad-ENV .v-head { top: -16px; right: 0; text-align: right; transform: translateX(8px); }
        #quad-MEC .v-head { top: -16px; left: 0; text-align: left; transform: translateX(-8px); }

        /* Override global OPT positioning for the OPT Tags to center them in the frame rings */
        .tl .opt-oval { left: 50px !important; top: 42px !important; font-size: 0.55rem !important; pointer-events: auto !important; letter-spacing: 1px !important; cursor:pointer;}
        .tr .opt-oval { right: 50px !important; top: 42px !important; font-size: 0.55rem !important; pointer-events: auto !important; letter-spacing: 1px !important; cursor:pointer;}
        .bl .opt-oval { left: 50px !important; bottom: 42px !important; font-size: 0.55rem !important; pointer-events: auto !important; letter-spacing: 1px !important; cursor:pointer;}
        .br .opt-oval { right: 50px !important; bottom: 42px !important; font-size: 0.55rem !important; pointer-events: auto !important; letter-spacing: 1px !important; cursor:pointer;}

        /* The Imaginary Rectangle: Expanded width pushes left text left and right text right */
        .t-row { display: flex; justify-content: space-between; width: 100%; font-size: 0.55rem; font-family: 'JetBrains Mono'; font-weight: 700; align-items: center;}
        
        /* Pure White Descriptors for Maximum Readability */
        .t-row span:first-child { color: #ffffff; text-shadow: 0 0 5px rgba(255,255,255,0.4); text-align: left; flex-shrink: 0; text-transform: uppercase; }

        .val-sm { font-family: 'Orbitron'; font-weight: 700; font-size: 0.6rem; z-index: 20; text-align: right; white-space: nowrap; color: var(--theme-main); text-shadow: 0 0 10px var(--theme-dim); text-transform: uppercase; transition: 0.3s; }
        
        .val-highlight { color: var(--env-green); text-shadow: 0 0 10px var(--env-green-dim); }

        .panel-data-wrapper { position: relative; width: 280px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 4px; margin: 0 auto; z-index: 20; }

        .sparkline-container { width: 100%; height: 14px; display: flex; align-items: flex-end; gap: 2px; margin: 2px 0; }
        .spark-bar { flex-grow: 1; background: var(--env-green); border-radius: 1px 1px 0 0; transition: height 0.5s ease, background 0.5s ease; opacity: 0.8; box-shadow: 0 0 5px var(--env-green-glow);}
        
        .master-wheel-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: var(--dial-size); height: var(--dial-size); display: flex; justify-content: center; align-items: center; z-index: 5; }
        .wheel-glass { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(167, 255, 131, 0.02) 0%, rgba(14, 165, 233, 0.05) 60%, rgba(2, 6, 23, 0.6) 100%); backdrop-filter: blur(8px); border: 1px solid var(--env-green-dim); box-shadow: 0 0 60px var(--env-green-dim), inset 0 0 40px rgba(0,0,0,0.8); pointer-events: none; }
        .equator-hub { position: absolute; width: 95%; height: 95%; top: 2.5%; left: 2.5%; pointer-events: none; z-index: 10; }

        #axis-hud { position: absolute; top: 12vh; left: 50%; transform: translateX(-50%); background: rgba(2, 6, 15, 0.9); border: 1px solid var(--env-green); padding: 8px 16px; font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; color: var(--env-green); border-radius: 4px; box-shadow: 0 0 15px var(--env-green-dim); z-index: 100; opacity: 0; transition: opacity 0.3s ease; text-align: center; pointer-events: none; letter-spacing: 2px; }

        .ecliptic-axis, .axial-tilt, .celestial-equator, .apsides-line { pointer-events: auto; cursor: crosshair; }
        .ecliptic-axis::after, .celestial-equator::after, .apsides-line::after { content: ''; position: absolute; top: -10px; left: 0; width: 100%; height: 20px; }
        .axial-tilt::after { content: ''; position: absolute; top: 0; left: -10px; width: 20px; height: 100%; }

        .ecliptic-axis { position: absolute; width: 100%; height: 2px; top: 50%; left: 0; background: linear-gradient(90deg, rgba(167,255,131,0) 0%, var(--env-green) 10%, var(--env-green) 90%, rgba(167,255,131,0) 100%); transform: translateY(-50%); z-index: 11; box-shadow: 0 0 10px var(--env-green-dim); }
        .axial-tilt { position: absolute; width: 2px; height: 100%; top: 0; left: 50%; background: linear-gradient(180deg, transparent 10%, var(--white-pure) 40%, var(--white-pure) 60%, transparent 90%); transform: translateX(-50%) rotate(23.5deg); z-index: 11; box-shadow: 0 0 10px rgba(255, 255, 255, 0.4); }
        .celestial-equator { position: absolute; width: 100%; height: 2px; top: 50%; left: 0; background: linear-gradient(90deg, transparent 10%, var(--white-pure) 40%, var(--white-pure) 60%, transparent 90%); transform: translateY(-50%) rotate(23.5deg); z-index: 11; box-shadow: 0 0 10px rgba(255, 255, 255, 0.4); }
        .apsides-line { position: absolute; width: 84.21%; height: 2px; top: 50%; left: 50%; background: linear-gradient(90deg, var(--atmos-blue) 0%, transparent 50%, var(--perihelion-mag) 100%); box-shadow: 0 0 10px var(--atmos-dim); transform: translate(-50%, -50%) rotate(-76deg); z-index: 11; }

        @keyframes solar-pulse-low { 0%, 100% { box-shadow: 0 0 20px var(--squall-amber), 0 0 40px rgba(245, 158, 11, 0.5), inset 0 0 5px #fff; opacity: 1; } 50% { box-shadow: 0 0 10px var(--squall-amber), 0 0 20px rgba(245, 158, 11, 0.3), inset 0 0 2px #fff; opacity: 0.85; } }
        .sun-fulcrum { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: var(--squall-amber); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: solar-pulse-low 3s ease-in-out infinite; z-index: 12; }

        .wheel-ring { position: absolute; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: transform 0.1s linear, box-shadow 0.3s ease; }
        .r-outer { width: 95%; height: 95%; border: 2px solid var(--env-green); opacity: 0.7; box-shadow: 0 0 15px var(--env-green-glow), inset 0 0 20px rgba(0,0,0,0.5); }
        .r-mid { width: 78%; height: 78%; background: conic-gradient(from 0deg, var(--void) 0deg, var(--env-green) 45deg, var(--void) 90deg, var(--env-green) 135deg, var(--void) 180deg, var(--env-green) 225deg, var(--void) 270deg, var(--env-green) 315deg, var(--void) 360deg); -webkit-mask: radial-gradient(transparent 65%, black 66%); opacity: 0.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .r-inner { width: 55%; height: 55%; border: 2px solid var(--env-green-dim); box-shadow: 0 0 0 1px var(--env-green), inset 0 0 30px var(--env-green-dim); background: rgba(0,0,0,0.4); }

        .horizon-cone { position: absolute; top: -10px; width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid var(--env-green); filter: drop-shadow(0 -5px 15px var(--env-green)); pointer-events: none; }
        .seasonal-marker { position: absolute; font-family: 'Segoe UI Emoji', Arial, sans-serif; font-size: 1.4rem; color: var(--env-green); filter: drop-shadow(0 0 8px var(--env-green-glow)); display: flex; justify-content: center; align-items: center; width: 40px; height: 40px; margin-left: -20px; margin-top: -20px; z-index: 50; pointer-events: none; background: rgba(2, 6, 23, 0.85); border: 1px solid var(--env-green-dim); border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.9); }

        .astro-tooltip { position: absolute; background: rgba(2, 6, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid; padding: 12px; border-radius: 6px; width: 220px; font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--starlight); z-index: 100; opacity: 0; visibility: hidden; transition: all 0.3s ease; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.9); text-shadow: none; }
        .astro-tt-head { font-family: 'Orbitron'; font-size: 0.75rem; font-weight: bold; margin-bottom: 6px; border-bottom: 1px dashed; padding-bottom: 4px; }
        
        .perihelion-marker { position: absolute; width: 14px; height: 14px; background: var(--perihelion-mag); border-radius: 50%; box-shadow: 0 0 25px var(--perihelion-mag), 0 0 10px #fff; z-index: 35; margin-left: -7px; margin-top: -7px; cursor: help; pointer-events: auto; }
        .aphelion-marker { position: absolute; width: 14px; height: 14px; background: var(--atmos-blue); border-radius: 50%; box-shadow: 0 0 25px var(--atmos-blue), 0 0 10px #fff; z-index: 35; margin-left: -7px; margin-top: -7px; cursor: help; pointer-events: auto; }
        
        .perihelion-marker:hover .astro-tooltip, .aphelion-marker:hover .astro-tooltip { opacity: 1; visibility: visible; }
        .perihelion-marker .astro-tooltip { border-color: var(--perihelion-mag); top: 20px; left: 20px; }
        .aphelion-marker .astro-tooltip { border-color: var(--atmos-blue); bottom: 20px; right: 20px; }

        .earth-pylon-container { position: absolute; width: 64px; height: 64px; margin-left: -32px; margin-top: -32px; z-index: 40; }
        .earth-axis { position: absolute; width: 2px; height: 140%; top: -20%; left: 50%; margin-left: -1px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.8) 20%, rgba(255,255,255,0.8) 80%, transparent); z-index: 1; box-shadow: 0 0 5px rgba(255,255,255,0.5); transform: rotate(23.5deg); }
        .earth-pylon { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; overflow: hidden; z-index: 2; background-color: #020813; transform: rotate(23.5deg) translateZ(0); -webkit-mask-image: -webkit-radial-gradient(white, black); }
        .globe-surface { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background-color: #0b2e59; background-image: url('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'); background-size: 128px 64px; background-repeat: repeat-x; animation: pan-surface linear infinite; }
        @keyframes pan-surface { 0% { background-position: 0px center; } 100% { background-position: 128px center; } }
        .speed-fast { animation-duration: 2.0s; } .speed-med { animation-duration: 4.0s; } .speed-slow { animation-duration: 7.0s; }
        .earth-shadow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 3; pointer-events: none; }
        .alpha-shadow { background: linear-gradient(to top, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0,0,0,0.35) 75%); } 
        .beta-shadow  { background: linear-gradient(to right, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0,0,0,0.35) 75%); } 
        .gamma-shadow { background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0,0,0,0.35) 75%); } 
        .delta-shadow { background: linear-gradient(to left, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0,0,0,0.35) 75%); } 
        .earth-volumetric { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 4; pointer-events: none; background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.2) 100%); box-shadow: inset -2px -2px 6px rgba(0,0,0,0.35), inset 2px 2px 6px rgba(255,255,255,0.4), 0 0 10px rgba(167, 255, 131, 0.2); }
    </style>
</head>
<body class="mode-q">

    <div class="matrix-layer"></div>
    <div class="star-container" id="stars"></div>
    <div id="axis-hud">GEOMETRIC AXIS DATA</div>

    <div class="master-wheel-container q-center-dial">
        <div class="wheel-glass"></div>
        <div class="equator-hub">
            <div class="ecliptic-axis" onmouseover="showAxisHUD('CARDINAL CROSS: ECLIPTIC EQUATOR (0°/180° - 90°/270°)')" onmouseout="hideAxisHUD()"></div>
            <div class="celestial-equator" onmouseover="showAxisHUD('CELESTIAL EQUATOR: PERPENDICULAR TO AXIS (23.5° TO ECLIPTIC)')" onmouseout="hideAxisHUD()"></div>
            <div class="axial-tilt" onmouseover="showAxisHUD('AXIAL CROSS: 23.5° OBLIQUITY (SEASONAL SHIFT)')" onmouseout="hideAxisHUD()"></div>
            <div class="apsides-line" onmouseover="showAxisHUD('LINE OF APSIDES: 14° PERIHELION TO 194° APHELION')" onmouseout="hideAxisHUD()"></div>
            <div class="sun-fulcrum"></div>
        </div>
        
        <div id="seasonal-markers" style="position:absolute; width:100%; height:100%; z-index:50; pointer-events:none;"></div>
        
        <div class="earth-pylon-container" style="top: 2.5%; left: 50%;" title="ALPHA / WINTER SOLSTICE / PERIHELION PROXIMITY">
            <div class="earth-axis"></div><div class="earth-pylon"><div class="globe-surface speed-fast"></div></div><div class="earth-shadow alpha-shadow"></div><div class="earth-volumetric"></div>
        </div>
        <div class="earth-pylon-container" style="top: 50%; left: 97.5%;" title="BETA / VERNAL EQUINOX / NOMINAL VELOCITY">
            <div class="earth-axis"></div><div class="earth-pylon"><div class="globe-surface speed-med"></div></div><div class="earth-shadow beta-shadow"></div><div class="earth-volumetric"></div>
        </div>
        <div class="earth-pylon-container" style="top: 97.5%; left: 50%;" title="GAMMA / SUMMER SOLSTICE / APHELION PROXIMITY">
            <div class="earth-axis"></div><div class="earth-pylon"><div class="globe-surface speed-slow"></div></div><div class="earth-shadow gamma-shadow"></div><div class="earth-volumetric"></div>
        </div>
        <div class="earth-pylon-container" style="top: 50%; left: 2.5%;" title="DELTA / AUTUMNAL EQUINOX / NOMINAL VELOCITY">
            <div class="earth-axis"></div><div class="earth-pylon"><div class="globe-surface speed-med"></div></div><div class="earth-shadow delta-shadow"></div><div class="earth-volumetric"></div>
        </div>

        <div class="wheel-ring r-outer"></div>
        <div class="wheel-ring r-mid"></div>
        <div class="wheel-ring r-inner" id="action-horizon-ring"><div class="horizon-cone"></div></div>
    </div>

    <div class="master-wheel-container q-center-dial" style="z-index: 60; pointer-events:none;">
        <div id="orbital-nodes" style="position:absolute; width:100%; height:100%;"></div>
    </div>

    <script>
        let liveWeather = null;
        let sparkBars = [];
        let showDelta = false;
        
        // Modal State Variables
        let alertThreshold = 75;
        let currentAssetMode = "FLORA";
        let iotProtocol = "MANUAL";
        let climateAnchor = "CLW";
        let baroUnit = "hPa";
        let actionHorizon = "PYLON";
        let tempUnit = "C";
        let thermoBaseline = 22.0;
        let crossVectorSync = true;
        
        let currentRiskVal = 0;
        let currentOptTarget = '';

        window.injectVectorData = function() {
            // Apply OPT properties globally to corner cutouts, mapped to distinct targets
            document.querySelectorAll('.opt-oval').forEach((el, index) => {
                el.innerText = 'OPT';
                el.style.setProperty('color', 'var(--env-green)', 'important');
                el.style.setProperty('text-shadow', '0 0 8px var(--env-green-dim)', 'important');
                
                let target = '';
                if(index === 0) target = 'risk';
                if(index === 1) target = 'meteo';
                if(index === 2) target = 'model';
                if(index === 3) target = 'phase';
                
                el.onclick = (e) => { e.stopPropagation(); openOptions(e, target); };
            });

            const quadBIO = document.getElementById('quad-BIO');
            if (quadBIO) {
                quadBIO.innerHTML = `
                    <div class="panel-data-wrapper">
                        <div class="v-head">RISK ASSESSMENT</div>
                        <div class="t-row"><span>SYSTEM HOOK:</span> <span id="iot-status-badge" class="val-sm val-highlight">IOT: ACTIVE</span></div>
                        <div class="t-row"><span>PROBABILITY INDEX:</span> <span class="val-sm val-highlight" id="risk-index">EPHEMERIS SYNCED</span></div>
                        <div class="sparkline-container" id="risk-sparkline"></div>
                        <div class="t-row"><span>ADVERSE CONDITION:</span> <span class="val-sm val-highlight" id="hazard-status" style="cursor:pointer;" onclick="openImpact()">MONITORED</span></div>
                    </div>
                `;
            }

            const quadCOM = document.getElementById('quad-COM');
            if (quadCOM) {
                quadCOM.innerHTML = `
                    <div class="panel-data-wrapper" style="cursor: pointer;" onclick="toggleDeltaView()">
                        <div class="v-head">METEOROLOGICAL</div>
                        <div class="t-row"><span>DATA STREAM:</span> <span id="meteo-badge" class="val-sm val-highlight">ATMOS DELTA: LIVE</span></div>
                        <div class="t-row"><span id="lbl-pressure">ATMOSPHERIC PRESSURE:</span> <span class="val-sm val-highlight" id="val-pressure">1013 hPa</span></div>
                        <div class="t-row"><span id="lbl-irradiance">SOLAR IRRADIANCE:</span> <span class="val-sm val-highlight" id="val-irradiance">ACTIVE</span></div>
                        <div class="t-row"><span id="lbl-precip">VOLUME / TREND:</span> <span class="val-sm val-highlight" id="val-precip">0.0mm / STABLE</span></div>
                    </div>
                `;
            }

            const quadENV = document.getElementById('quad-ENV');
            if (quadENV) {
                quadENV.innerHTML = `
                    <div class="panel-data-wrapper">
                        <div class="v-head" id="strat-header">EXPOSURE MODELING</div>
                        <div class="t-row"><span id="lbl-yield">YIELD PROJECTION:</span> <span class="val-sm val-highlight" id="strat-yield" style="cursor:pointer;" onclick="openImpact()">OPTIMAL</span></div>
                        <div class="t-row"><span id="lbl-alloc">RESOURCE ALLOC:</span> <span class="val-sm val-highlight" id="strat-alloc" style="cursor:pointer;" onclick="openImpact()">PHASE 2 (GROWTH)</span></div>
                        <div class="t-row"><span>ACTION HORIZON:</span> <span class="val-sm val-highlight" id="strat-horizon">+14.00°</span></div>
                    </div>
                `;
            }

            const quadMEC = document.getElementById('quad-MEC');
            if (quadMEC) {
                quadMEC.innerHTML = `
                    <div class="panel-data-wrapper">
                        <div class="v-head">ENVIRONMENTAL</div>
                        <div class="t-row"><span>AMBIENT TEMP:</span> <span class="val-sm val-highlight" id="val-temp">-- °C</span></div>
                        <div class="t-row"><span>BIOME TENSION:</span> <span class="val-sm val-highlight" id="agri-tension">DORMANT / GATHER</span></div>
                        <div class="t-row"><span>THERMODYNAMIC FRICTION:</span> <span class="val-sm val-highlight" id="thermo-friction">--</span></div>
                    </div>
                `;
            }
        };

        function initLocalHUD() {
            const checkExist = setInterval(function() {
                if (document.getElementById('quad-BIO')) {
                    clearInterval(checkExist);
                    if (window.injectVectorData) window.injectVectorData();
                    initSparklines();
                }
            }, 50);
            setTimeout(() => clearInterval(checkExist), 5000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLocalHUD);
        } else {
            initLocalHUD();
        }

        function showAxisHUD(text) {
            const hud = document.getElementById('axis-hud');
            hud.innerText = text;
            hud.style.opacity = '1';
        }

        function hideAxisHUD() {
            document.getElementById('axis-hud').style.opacity = '0';
        }

        function initSparklines() {
            const container = document.getElementById('risk-sparkline');
            if(!container) return;
            container.innerHTML = '';
            sparkBars = [];
            for(let i=0; i<30; i++) {
                let bar = document.createElement('div');
                bar.className = 'spark-bar';
                container.appendChild(bar);
                sparkBars.push(bar);
            }
        }

        function renderSeasonalMarkers(mode) {
            const container = document.getElementById('seasonal-markers');
            if(!container) return;
            container.innerHTML = '';
            
            const markers = [
                { arc: 45, icon: mode === 'FAUNA' ? '❄️' : '🌱' },
                { arc: 135, icon: mode === 'FAUNA' ? '🐣' : '🌿' },
                { arc: 225, icon: mode === 'FAUNA' ? '☀️' : '🌾' },
                { arc: 315, icon: mode === 'FAUNA' ? '🍂' : '🍁' }
            ];
            
            markers.forEach(m => {
                let el = document.createElement('div');
                el.className = 'seasonal-marker';
                el.innerText = m.icon;
                let angle = (m.arc - 90) * (Math.PI / 180);
                let x = 50 + 40 * Math.cos(angle);
                let y = 50 + 40 * Math.sin(angle);
                el.style.left = x + '%';
                el.style.top = y + '%';
                container.appendChild(el);
            });
        }

        function renderOrbitalNodes() {
            const container = document.getElementById('orbital-nodes');
            if(!container) return;
            container.innerHTML = '';
            
            let peri = document.createElement('div');
            peri.className = 'perihelion-marker';
            let pAngle = (14 - 90) * (Math.PI / 180);

        async function fetchMeteoData() {
            const API_LOCATIONS = {
                'CLW': { lat: 27.9659, lon: -82.8001 },
                'PHL': { lat: 39.9526, lon: -75.1652 },
                'ENC': { lat: 34.1593, lon: -118.5012 },
                'GLOBAL': { lat: window.Q_STATE?.location?.lat || 0, lon: window.Q_STATE?.location?.lon || 0 }
            };

            const loc = API_LOCATIONS[climateAnchor] || API_LOCATIONS['CLW']; 
            
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=' + loc.lat + '&longitude=' + loc.lon + '&current=surface_pressure,direct_normal_irradiance,precipitation,temperature_2m');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                if (data && data.current) {
                    liveWeather = data.current;
                    if(window.Q_LOG) window.Q_LOG('INFO', 'ENVIRONMENTAL', 'METEO_API_SYNC', data.current);
                    const badge = document.getElementById('meteo-badge');
                    if(badge) {
                        badge.innerText = "ATMOS DELTA: LIVE";
                    }
                }
            } catch (error) {
                if(window.Q_LOG) window.Q_LOG('ERROR', 'ENVIRONMENTAL', 'METEO_API_FAILED', { error: error.message, fallback: 'STATIC_BASELINE' });
                const badge = document.getElementById('meteo-badge');
                if(badge) {
                    badge.innerText = "STATIC BASELINE (DEGRADED)";
                }
                liveWeather = null;
            }
        }

        window.addEventListener('q-tick', (e) => {
            const { t, isLive, activeTime, daysElapsed, qData, legacyDateStr, legacyTimeStr, activePostulate } = e.detail;

            // Utility function to format legacy strings (grey letters/symbols, env-green numbers)
            function formatDualColor(str) {
                const letterStyle = "color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-right:2px;";
                const numStyle = "color:var(--env-green); font-size:1.1rem; font-weight:bold;";
                let out = "";
                let tokens = str.match(/([0-9]+)|([^0-9]+)/g);
                if (tokens) {
                    tokens.forEach(token => {
                        if (/[0-9]/.test(token)) {
                            out += `<span style="${numStyle}">${token}</span>`;
                        } else {
                            out += `<span style="${letterStyle}">${token}</span>`;
                        }
                    });
                }
                return out;
            }

            const legDateEl = document.getElementById('ap-leg-date') || document.getElementById('leg-date');
            if (legDateEl) legDateEl.innerHTML = `<span style="color:var(--theme-main); font-weight:bold; text-shadow:0 0 10px var(--theme-dim);">${legacyDateStr.toUpperCase()}</span>`;

                trueDegEl.style.textShadow = '0 0 10px var(--theme-dim)';
            }
            
            const badge = document.getElementById('iot-status-badge');
            if(badge) badge.innerText = 'IOT: ' + iotProtocol;

            const trueArc = qData.trueArc;
            const meanArc = qData.meanArc;
            
            if (Math.abs(qData.delta) > 0.025 && window.Q_PHASE_III) {
                window.Q_PHASE_III.executeThermicOverride(qData.delta);
            }
            
            let activeBlock = window.getQBlockByTime ? window.getQBlockByTime(t) : null;
            const qCoordWing = document.getElementById('ap-q-coord') || document.getElementById('q-coord-wing');
            
            let smLetterStyle = "color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-right:2px;";
            let smNumStyle = "color:var(--env-green); font-size:1.1rem; font-weight:bold;";
            
            if (qCoordWing) {
                if (activeBlock && activeBlock.type === 'PYLON') {
                    qCoordWing.innerHTML = `<span style="font-size:0.9rem; color:var(--env-green); font-family:'Orbitron'; font-weight:bold; text-shadow: 0 0 10px var(--env-green-dim);">${activeBlock.name}</span>`;

                                           `<span style="${smLetterStyle} margin-left:6px;">Q</span><span style="${smNumStyle}">${qData.quad}</span> ` +
                                           `<span style="${smLetterStyle} margin-left:6px;">S</span><span style="${smNumStyle}">${qData.sect}</span> ` +
                                           `<span style="${smLetterStyle} margin-left:6px;">DAY</span><span style="${smNumStyle}">${qData.day}</span>`;
                }
            }

            const continuousMeanDeg = daysElapsed * (360 / 365.24219);
            const continuousTrueDeg = continuousMeanDeg + qData.delta;
            const actionRing = document.getElementById('action-horizon-ring');
            if (actionRing) actionRing.style.transform = `rotate(${continuousTrueDeg}deg)`;

            let dangerProximity = Math.abs(Math.sin((trueArc * Math.PI) / 90)); 
            currentRiskVal = Math.floor(dangerProximity * 85) + 10; 
            
            if (liveWeather && isLive) {
                if (liveWeather.precipitation > 0) currentRiskVal += (liveWeather.precipitation * 2);
                if (liveWeather.surface_pressure < 1005) currentRiskVal += 15;
                if (liveWeather.direct_normal_irradiance > 600) currentRiskVal += 10;
                currentRiskVal = Math.min(currentRiskVal, 99);

            let hazardEl = document.getElementById('hazard-status');

            if (allocEl) allocEl.onclick = (e) => { e.stopPropagation(); openImpact(); };

                    if(hazardEl) hazardEl.onclick = (e) => { e.stopPropagation(); logShieldingIntent(); };

                if(hazardEl) hazardEl.innerText = "MONITORED / STABLE";

                let pastArc = trueArc - (30 - index);
                let pastDanger = Math.abs(Math.sin((pastArc * Math.PI) / 90));
                let h = Math.floor(pastDanger * 14);

                bar.style.background = "var(--env-green)";

                const valPress = document.getElementById('val-pressure');

                    let deltaPress = currentRiskVal / 10;
                    let sign = currentRiskVal > 50 ? '-' : '+';
                    let v = baroUnit === 'inHg' ? (deltaPress * 0.02953).toFixed(2) : deltaPress.toFixed(1);

                    valPress.innerText = `${sign}${v} ${u}`;

                if(valPrecip) {
                    valPrecip.innerText = (currentRiskVal > 50 ? '+45%' : '-5%') + ' FROM NORM';
                }
                const valTemp = document.getElementById('val-temp');
                if(valTemp) {
                    let deltaTemp = currentRiskVal / 15;
                    let sign = currentRiskVal > 50 ? '+' : '-';
                    let v = tempUnit === 'F' ? (deltaTemp * 9/5).toFixed(1) : deltaTemp.toFixed(1);
                    let u = tempUnit === 'F' ? '°F' : '°C';
                    valTemp.innerText = `${sign}${v} ${u}`;
                }
            } else {
                let currentTempC = 22.0;
                let currentPress = (1015 - Math.floor(currentRiskVal/2));
                
                if (liveWeather && isLive) {
                    currentTempC = liveWeather.temperature_2m;
                    currentPress = liveWeather.surface_pressure;
                    
                    const valIrr = document.getElementById('val-irradiance');
                    if(valIrr) valIrr.innerText = liveWeather.direct_normal_irradiance.toFixed(1) + ' W/m²';
                    
                    const valPrecip = document.getElementById('val-precip');
                    if(valPrecip) {
                        valPrecip.innerText = liveWeather.precipitation.toFixed(1) + 'mm / LIVE';
                    }
                } else {
                    const valIrr = document.getElementById('val-irradiance');
                    if(valIrr) valIrr.innerText = "ACTIVE / NOMINAL";
                    const valPrecip = document.getElementById('val-precip');
                    if(valPrecip) {
                        valPrecip.innerText = "0.0mm / STABLE";
                    }
                }
                
                const valPress = document.getElementById('val-pressure');
                if(valPress) {
                    let v = baroUnit === 'inHg' ? (currentPress * 0.02953).toFixed(2) : currentPress.toFixed(1);
                    let u = baroUnit === 'inHg' ? 'inHg' : 'hPa';
                    valPress.innerText = `${v} ${u}`;
                }
                
                const valTemp = document.getElementById('val-temp');
                if(valTemp) {
                    let v = tempUnit === 'F' ? (currentTempC * 9/5 + 32).toFixed(1) : currentTempC.toFixed(1);
                    let u = tempUnit === 'F' ? '°F' : '°C';
                    valTemp.innerText = `${v} ${u}`;
                }
            }

            if (currentAssetMode === "FAUNA") {
                if(currentRiskVal >= alertThreshold) {
                    if(yieldEl) { yieldEl.innerText = "LETHAL ZONE"; }
                    if(allocEl) { allocEl.innerText = "SHELTER / HYDRATE"; }
                } else if (currentRiskVal >= alertThreshold - 25) {
                    if(yieldEl) { yieldEl.innerText = "BEHAVIORAL SHIFT"; }
                    if(allocEl) { allocEl.innerText = "ADJUST CALORIC BURN"; }
                } else {
                    if(yieldEl) { yieldEl.innerText = "NOMINAL EXPOSURE"; }
                    if(allocEl) { allocEl.innerText = "STANDARD ROUTINE"; }
                }
            } else {
                if(currentRiskVal >= alertThreshold) {
                    if(yieldEl) { yieldEl.innerText = "COMPROMISED"; }
                    if(allocEl) { allocEl.innerText = "EMERGENCY SHIELD"; }
                } else if (currentRiskVal >= alertThreshold - 25) {
                    if(yieldEl) { yieldEl.innerText = "MODERATE VARIANCE"; }
                    if(allocEl) { allocEl.innerText = "CONSERVATION MODE"; }
                } else {
                    if(yieldEl) { yieldEl.innerText = "OPTIMAL / GROWTH"; }
                    if(allocEl) { allocEl.innerText = "PHASE 2 (EXPANSION)"; }
                }
            }
            
            let tensionEl = document.getElementById('agri-tension');
            if(tensionEl) {
                if (qData.quad === 1) { tensionEl.innerText = "DORMANT / GATHER"; }
                else if (qData.quad === 2) { tensionEl.innerText = "AWAKENING / PUSH"; }
                else if (qData.quad === 3) { tensionEl.innerText = "CLIMAX / SUSTAIN"; }
                else { tensionEl.innerText = "RECESSION / HARVEST"; }
            }
            
            // Calculate Thermodynamic Friction against baseline
            const solarBaselineTempC = thermoBaseline + 10 * Math.sin((trueArc - 90) * Math.PI / 180);
            let currentTempC = (liveWeather && isLive) ? liveWeather.temperature_2m : 22.0;
            let thermoFrictionC = Math.abs(currentTempC - solarBaselineTempC);
            
            const thermoFrictionEl = document.getElementById('thermo-friction');
            if (thermoFrictionEl) {
                let fricDisp = tempUnit === 'F' ? (thermoFrictionC * 9/5).toFixed(2) : thermoFrictionC.toFixed(2);
                let u = tempUnit === 'F' ? 'ΔF' : 'ΔC';
                thermoFrictionEl.innerText = `${fricDisp} ${u}`;
            }
        });

        if(window.generateStars) window.generateStars('stars');
        renderSeasonalMarkers(currentAssetMode); 
        renderOrbitalNodes();
        fetchMeteoData();
        setInterval(fetchMeteoData, 300000);
    </script>
</body>
</html>
