<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>THE QUADRATURE // BIOLOGICAL VECTOR</title>
    
    <script src="../q-ui-global.js?v=21.8"></script>
    <script src="../q-core.js?v=21.8"></script>
    <script src="../q-ui-planner.js?v=21.8"></script>
    <script src="../q-hub.js?v=21.8"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Orbitron:wght@400;500;700;900&display=swap');

        :root {
            --void: #05080f; 
            --bio-purple: #b829ff; 
            --bio-purple-dim: rgba(184, 41, 255, 0.2);
            --bio-cobalt: #0055ff;
            --bio-cobalt-dim: rgba(0, 85, 255, 0.3);
            --sys-cyan: #00f0ff;
            --env-green: #a7ff83;
            --warn-orange: #ffaa00; 
            --friction-red: #ff3333;
            --theme-main: var(--bio-purple); 
            --theme-dim: var(--bio-purple-dim);
            --gold: #F4D068;
            --platinum: #E5E4E2;
            --starlight: rgba(255, 255, 255, 0.6);
        }

        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; 
            background-color: var(--void); 
            background: radial-gradient(circle at center, #0f0a1c 0%, var(--void) 90%); 
            color: #fff; font-family: 'JetBrains Mono', monospace; display: flex; 
            justify-content: center; align-items: center; user-select: none; 
            color-scheme: dark; perspective: 1500px; transform-style: preserve-3d; 
            touch-action: manipulation;
        }

        #q-universal-modal { z-index: 999999 !important; }

        /* Headers bound strictly to the 280px text wrapper edge, shifted outwards by 1 character (8px) */
        .v-head { 
            position: absolute; white-space: nowrap;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; 
            margin: 0; padding: 0; z-index: 25; border: none;
            color: var(--theme-main);
            text-shadow: 0 0 10px var(--theme-dim);
        }
        
        /* Top Panels: Headers tight BELOW the frame */
        #quad-BIO .v-head { bottom: -16px; right: 0; text-align: right; transform: translateX(-8px); }
        #quad-COM .v-head { bottom: -16px; left: 0; text-align: left; transform: translateX(8px); }
        
        /* Bottom Panels: Headers tight ABOVE the frame */
        #quad-ENV .v-head { top: -16px; right: 0; text-align: right; transform: translateX(-8px); }
        #quad-MEC .v-head { top: -16px; left: 0; text-align: left; transform: translateX(8px); }

        /* Override global OPT positioning for the Sovereign Tags to center them in the frame rings */
        .tl .opt-oval { left: 35px !important; top: 42px !important; }
        .tr .opt-oval { right: 35px !important; top: 42px !important; }
        .bl .opt-oval { left: 35px !important; bottom: 42px !important; }
        .br .opt-oval { right: 35px !important; bottom: 42px !important; }

        /* The Imaginary Rectangle: Expanded width pushes left text left and right text right */
        .t-row { display: flex; justify-content: space-between; width: 100%; font-size: 0.55rem; font-family: 'JetBrains Mono'; font-weight: 700; align-items: center;}
        
        /* Pure White Descriptors for Maximum Readability */
        .t-row span:first-child { color: #ffffff; text-shadow: 0 0 5px rgba(255,255,255,0.4); text-align: left; flex-shrink: 0; text-transform: uppercase; }

        .val-sm { font-family: 'Orbitron'; font-weight: 700; font-size: 0.6rem; z-index: 20; text-align: right; white-space: nowrap; color: var(--theme-main); text-shadow: 0 0 10px var(--theme-dim); text-transform: uppercase; }

        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .bar-fill { height: 100%; background: var(--theme-main); width: 0%; box-shadow: 0 0 10px var(--theme-main); transition: width 0.1s linear; }

        .astrolabe-root { position: absolute; width: var(--dial-size); height: var(--dial-size); max-width: 550px; max-height: 550px; display: flex; justify-content: center; align-items: center; z-index: 5; pointer-events: none; }
        .ls-ring { position: absolute; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .ls-outer { width: 100%; height: 100%; border: 1px dashed var(--bio-cobalt-dim); }
        .ls-inner { width: 50%; height: 50%; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        
        .ls-center-hud { position: absolute; width: 35%; height: 35%; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        
        .bio-earth-core { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background-color: #020204; overflow: hidden; box-shadow: 0 0 20px var(--bio-cobalt-dim), 0 0 40px var(--bio-purple-dim), inset -10px -10px 20px rgba(0,0,0,0.9); pointer-events: none; }
        .bio-earth-surface { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background-image: url('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'); background-size: 200% 100%; filter: grayscale(80%) sepia(50%) hue-rotate(240deg) saturate(200%) brightness(0.65) contrast(1.2); opacity: 0.8; }
        .night-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 2; background: radial-gradient(circle at 70% 30%, rgba(0, 85, 255, 0.25) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0.8) 100%); pointer-events: none; box-shadow: inset 0 0 30px rgba(0,0,0,0.7); }

        .aura-glow { position: absolute; width: 100%; height: 100%; border-radius: 50%; transition: all 1s ease; opacity: 0.4; z-index: -1; }
        .flow-aura { background: radial-gradient(circle, var(--bio-cobalt) 0%, var(--bio-purple) 45%, transparent 75%); box-shadow: 0 0 80px var(--bio-cobalt), inset 0 0 40px var(--bio-purple); }
        .vent-aura { background: radial-gradient(circle, var(--bio-cobalt) 0%, var(--bio-purple-dim) 50%, transparent 75%); box-shadow: 0 0 60px var(--bio-purple); animation: aura-pulse 3s infinite; }
        @keyframes aura-pulse { 0%, 100% { transform: scale(1); opacity: 0.25; } 50% { transform: scale(1.15); opacity: 0.45; } }
        
        #lunar-nodes-container { position: absolute; width: 100%; height: 100%; z-index: 6; pointer-events: none; }
        .lunar-phase-icon { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; }
    </style>
</head>
<body class="mode-q">

    <div class="star-container" id="stars" style="z-index: 1;"></div>

    <div class="astrolabe-root q-center-dial">
        <div class="ls-ring ls-outer"></div>
        <div class="ls-ring ls-inner"></div>
        
        <div id="lunar-nodes-container"></div>
        
        <div class="ls-center-hud">
            <div id="bio-aura" class="aura-glow"></div>
            
            <div class="bio-earth-core">
                <div class="bio-earth-surface"></div>
                <div class="night-overlay"></div>
            </div>
        </div>
    </div>

    <script>
        let cycleDuration = parseInt(localStorage.getItem('q_bio_duration')) || 90; 
        let savedAnchor = localStorage.getItem('q_bio_anchor');
        let isAutoAnchor = (savedAnchor === null || savedAnchor === "");
        let anchorMins = isAutoAnchor ? 0 : parseInt(savedAnchor); 
        let lastRenderedScrub = null;
        let lastBioState = "";

        window.injectVectorData = function() {
            // Force SOVEREIGN tag display, scaled up, strictly violet, and positioned correctly
            document.querySelectorAll('.opt-oval').forEach(el => {
                el.innerText = 'SOVEREIGN';
                el.style.fontSize = '0.45rem';
                el.style.pointerEvents = 'none'; 
                el.style.letterSpacing = '1px';
                el.style.setProperty('color', 'var(--bio-purple)', 'important');
                el.style.setProperty('text-shadow', '0 0 8px var(--bio-purple-dim)', 'important');
            });

            const quadBIO = document.getElementById('quad-BIO');
            if (quadBIO) {
                quadBIO.innerHTML = `
                    <div style="position: relative; width: 280px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 2px; margin: 0 auto;">
                        <div class="v-head">SUNLIGHT EXPOSURE</div>
                        <div class="t-row"><span>SOLAR LUX TARGET:</span> <span id="lux-avail" class="val-sm">--</span></div>
                        <div class="t-row"><span>UV INDEX EXPOSURE:</span> <span id="uv-index" class="val-sm">--</span></div>
                        <div class="t-row"><span>SOLAR NOON (ZENITH):</span> <span id="solar-noon" class="val-sm">--</span></div>
                    </div>
                `;
            }

            const quadCOM = document.getElementById('quad-COM');
            if (quadCOM) {
                quadCOM.innerHTML = `
                    <div style="position: relative; width: 280px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 2px; margin: 0 auto;">
                        <div class="v-head">LUNAR/TIDE IMPACT</div>
                        <div class="t-row"><span>LUNAR ILLUMINATION:</span> <span id="lunar-illum" class="val-sm">--</span></div>
                        <div class="t-row"><span>TIDAL GRAV (SLEEP):</span> <span id="tidal-impact" class="val-sm">NOMINAL</span></div>
                        <div class="t-row"><span>LUNAR PHASE:</span> <span id="lunar-phase-name" class="val-sm">--</span></div>
                    </div>
                `;
            }

            const quadENV = document.getElementById('quad-ENV');
            if (quadENV) {
                quadENV.innerHTML = `
                    <div style="position: relative; width: 280px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 2px; margin: 0 auto;">
                        <div class="v-head">INTERNAL CLOCK</div>
                        <div class="t-row"><span>RESTING HR (RHR):</span> <span id="bio-rhr" class="val-sm">-- BPM</span></div>
                        <div class="t-row"><span>HRV ELASTICITY:</span> <span id="bio-hrv" class="val-sm">-- MS</span></div>
                        <div class="t-row"><span>SLEEP STAGE:</span> <span id="mat-sleep" class="val-sm">DEEP</span></div>
                        <div class="t-row"><span>BIOLOGICAL SYNC:</span> <span id="bio-sync-pct" class="val-sm">--%</span></div>
                    </div>
                `;
            }

            const quadMEC = document.getElementById('quad-MEC');
            if (quadMEC) {
                quadMEC.innerHTML = `
                    <div style="position: relative; width: 280px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 2px; margin: 0 auto;">
                        <div class="v-head">FOCUS CYCLE</div>
                        <div class="t-row"><span>STATE:</span> <span id="bio-state" class="val-sm">--</span></div>
                        <div class="t-row"><span>ELAPSED:</span> <span id="bio-timer" class="val-sm">-- / 90 MIN</span></div>
                        <div class="t-row"><span>PHASE COMPLETION:</span> <span id="phase-completion-q" class="val-sm" style="cursor:pointer; border-bottom:1px dashed var(--theme-dim); transition:0.3s;" onmouseover="this.style.color='#fff';" onmouseout="this.style.color='var(--theme-main)';">--</span></div>
                        <div class="bar-bg"><div class="bar-fill" id="bio-bar"></div></div>
                    </div>
                `;
            }
        };

        function initLocalHUD() {
            const checkExist = setInterval(function() {
                if (document.getElementById('quad-BIO')) {
                    clearInterval(checkExist);
                    if (window.injectVectorData) window.injectVectorData();
                    engageBiometricVector();
                }
            }, 50);
            // Failsafe clear
            setTimeout(() => clearInterval(checkExist), 5000);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLocalHUD);
        } else {
            initLocalHUD();
        }

        async function engageBiometricVector() {
            if (window.Q_PHASE_III && window.Q_PHASE_III.syncBiometrics) {
                try {
                    const dynamicDuration = await window.Q_PHASE_III.syncBiometrics();
                    if (!localStorage.getItem('q_bio_duration')) cycleDuration = dynamicDuration;
                    
                    const syncPct = document.getElementById('bio-sync-pct');
                    if (syncPct) syncPct.innerText = "100%";
                } catch(e) {
                    const syncPct = document.getElementById('bio-sync-pct');
                    if (syncPct) syncPct.innerText = "FAIL";
                }
            }
        }

        function getPhaseName(f) {
            if (f === 0 || f === 1) return "NEW MOON";
            if (f < 0.25) return "WAXING CRESCENT";
            if (f === 0.25) return "FIRST QUARTER";
            if (f < 0.5) return "WAXING GIBBOUS";
            if (f === 0.5) return "FULL MOON";
            if (f < 0.75) return "WANING GIBBOUS";
            if (f === 0.75) return "THIRD QUARTER";
            return "WANING CRESCENT";
        }

        function getDynamicMoonSVG(phaseFloat, isApex, isPrimary) {
            let shadowColor = isApex ? 'rgba(0, 85, 255, 1)' : `rgba(0, 85, 255, ${(phaseFloat > 0.4 && phaseFloat < 0.6) ? 0.8 : 0.2})`;
            let shadowSize = isApex ? '15px' : (isPrimary ? '8px' : '3px');
            let html = `<svg viewBox="0 0 32 32" width="100%" height="100%" style="border-radius:50%; box-shadow: 0 0 ${shadowSize} ${shadowColor};">`;
            html += `<circle cx="16" cy="16" r="15" fill="#05080f" stroke="rgba(184,41,255,0.4)" stroke-width="1"/>`;
            let rx = Math.max(0.01, Math.abs(15 * Math.cos(phaseFloat * 2 * Math.PI))); 
            let sweep = phaseFloat < 0.5 ? (phaseFloat <= 0.25 ? 0 : 1) : (phaseFloat <= 0.75 ? 0 : 1);
            let path = phaseFloat < 0.5 ? `M 16 1 A 15 15 0 0 1 16 31 A ${rx} 15 0 0 ${sweep} 16 1` : `M 16 1 A 15 15 0 0 0 16 31 A ${rx} 15 0 0 ${sweep} 16 1`;
            if (phaseFloat === 0.5) html += `<circle cx="16" cy="16" r="15" fill="#E5E4E2"/>`;
            else if (phaseFloat !== 0 && phaseFloat !== 1) html += `<path d="${path}" fill="#E5E4E2"/>`;
            html += `</svg>`;
            return html;
        }

        function renderDynamicMoons(daysElapsed) {
            const container = document.getElementById('lunar-nodes-container');
            if (!container) return;
            
            container.innerHTML = '';
            const synodicMonth = 29.530588;
            const C = Math.floor((daysElapsed + 1.555) / synodicMonth);
            const windowDays = 100;
            
            let closestNode = null;
            let minDelta = Infinity;
            let allNodes = [];

            for (let c = C - 4; c <= C + 4; c++) {
                for (let p = 0; p < 16; p++) {
                    let phaseFloat = p / 16;
                    let absoluteDays = c * synodicMonth + (phaseFloat * synodicMonth) - 1.555;
                    let deltaDays = absoluteDays - daysElapsed;
                    allNodes.push({ absoluteDays, deltaDays, c, p, phaseFloat });
                    
                    if (Math.abs(deltaDays) < minDelta) {
                        minDelta = Math.abs(deltaDays);
                        closestNode = { c, p };
                    }
                }
            }

            allNodes.forEach(n => {
                if (Math.abs(n.deltaDays) <= windowDays) {
                    let opacity = Math.pow(1 - (Math.abs(n.deltaDays) / windowDays), 1.5); 
                    let meanArc = (n.absoluteDays * (360 / 365.24219)) % 360;
                    if (meanArc < 0) meanArc += 360;
                    let rad = (meanArc - 90) * (Math.PI / 180);
                    
                    let isPrimary = (n.p % 4 === 0);
                    let rMap = 46 - 8 * Math.cos(n.phaseFloat * 2 * Math.PI);
                    let x = 50 + rMap * Math.cos(rad);
                    let y = 50 + rMap * Math.sin(rad);
                    
                    let isApex = (n.c === closestNode.c && n.p === closestNode.p);
                    let size = isApex ? 28 : (isPrimary ? 18 : 10);
                    let zIndex = isApex ? 50 : (isPrimary ? 20 : 10);
                    
                    let node = document.createElement('div');
                    node.className = 'lunar-phase-icon';
                    node.style.cssText = `position:absolute; width:${size}px; height:${size}px; margin-left:${-(size/2)}px; margin-top:${-(size/2)}px; left:${x}%; top:${y}%; opacity:${isApex ? 1.0 : opacity}; z-index:${zIndex}; cursor:help; pointer-events:auto;`;
                    
                    if (isApex) {
                        node.style.filter = 'drop-shadow(0 0 10px var(--bio-cobalt)) drop-shadow(0 0 20px var(--bio-purple)) brightness(1.2)';
                    }
                    
                    node.innerHTML = getDynamicMoonSVG(n.phaseFloat, isApex, isPrimary);
                    
                    node.onclick = () => {
                        const targetMs = window.PYLON_ALPHA_DYNAMIC + (n.absoluteDays * window.MS_DAY);
                        const fd = window.formatLegacyDate(targetMs);
                        const phaseName = getPhaseName(n.phaseFloat);
                        window.Q_ModalEngine.render(`LUNAR PHASE: ${phaseName}`, `
                            <div style="font-family:'JetBrains Mono'; font-size:0.75rem; color:var(--platinum); text-align:center; line-height: 1.6;">
                                <span style="color:var(--theme-main); font-family:'Orbitron'; font-weight:bold; font-size:0.85rem;">${fd.dateStr}</span><br>
                                ILLUMINATION: ${(n.phaseFloat > 0.5 ? (1 - n.phaseFloat) * 200 : n.phaseFloat * 200).toFixed(1)}%<br>
                                ORBITAL ARC: ${meanArc.toFixed(2)}°
                            </div>
                        `);
                    };
                    
                    container.appendChild(node);
                }
            });
        }

        function calculateSolarMetrics(daysElapsed) {
            const lat = window.Q_STATE?.location?.lat || 0;
            const declination = 23.45 * Math.sin((360 / 365.24219) * (daysElapsed - 81) * Math.PI / 180);
            return {
                lux: (declination > 0 && lat > 0) || (declination < 0 && lat < 0) ? "HIGH (>10,000)" : "LOW (<2,500)",
                uv: (declination > 0 && lat > 0) || (declination < 0 && lat < 0) ? "MODERATE-HIGH" : "LOW-MINIMAL",
                sunsetOffset: (declination > 0 && lat > 0) || (declination < 0 && lat < 0) ? 1 : -1
            };
        }

        window.addEventListener('q-tick', (e) => {
            const { t, isLive, activeTime, daysElapsed, qData, legacyDateStr, legacyTimeStr } = e.detail;

            if (lastRenderedScrub === null || Math.abs(daysElapsed - lastRenderedScrub) > 0.05) {
                renderDynamicMoons(daysElapsed);
                lastRenderedScrub = daysElapsed;
            }

            function formatDualColor(str) {
                const letterStyle = "color:var(--starlight); font-family:'Orbitron'; font-size:0.8rem; margin-right:2px;";
                const numStyle = "color:var(--theme-main); font-size:1.1rem; font-weight:bold;";
                let out = "";
                let tokens = str.match(/([0-9]+)|([^0-9]+)/g);
                if (tokens) {
                    tokens.forEach(token => {
                        if (/[0-9]/.test(token)) out += `<span style="${numStyle}">${token}</span>`;
                        else out += `<span style="${letterStyle}">${token}</span>`;
                    });
                }
                return out;
            }

            const legDateEl = document.getElementById('leg-date');
            if (legDateEl) legDateEl.innerHTML = `<span style="color:var(--theme-main); font-weight:bold; text-shadow:0 0 10px var(--theme-dim);">${legacyDateStr.toUpperCase()}</span>`;
            
            const legTimeEl = document.getElementById('leg-time');
            if (legTimeEl) legTimeEl.innerHTML = formatDualColor(legacyTimeStr);

            const qCoordWing = document.getElementById('q-coord-wing');
            if (qCoordWing) {
                let activeBlock = window.getQBlockByTime ? window.getQBlockByTime(t) : null;
                if (activeBlock && activeBlock.type === 'PYLON') {
                    qCoordWing.innerHTML = `<span style="font-size:0.9rem; color:var(--theme-main); font-family:'Orbitron'; font-weight:bold; text-shadow: 0 0 10px var(--theme-dim);">${activeBlock.name}</span>`;
                } else {
                    let cCycle = activeBlock ? activeBlock.cycle : 0;
                    qCoordWing.innerHTML = `<span style="color:var(--starlight);">QC</span><span style="color:var(--theme-main); font-weight:bold;">${cCycle}</span> <span style="color:var(--starlight);">Q</span><span style="color:var(--theme-main); font-weight:bold;">${qData.quad}</span> <span style="color:var(--starlight);">S</span><span style="color:var(--theme-main); font-weight:bold;">${qData.sect}</span> <span style="color:var(--starlight);">DAY</span><span style="color:var(--theme-main); font-weight:bold;">${qData.day}</span>`;
                }
            }

            const meanDegEl = document.getElementById('mean-deg');
            if (meanDegEl) { 
                meanDegEl.innerText = qData.meanArc.toFixed(4) + "°";
                meanDegEl.style.setProperty('color', 'var(--theme-main)', 'important');
                meanDegEl.style.textShadow = '0 0 10px var(--theme-dim)';
            }
            
            const trueDegEl = document.getElementById('true-deg');
            if (trueDegEl) { 
                trueDegEl.innerText = qData.trueArc.toFixed(4) + "°";
                trueDegEl.style.setProperty('color', 'var(--theme-main)', 'important');
                trueDegEl.style.textShadow = '0 0 10px var(--theme-dim)';
            }

            const earthSurface = document.querySelector('.bio-earth-surface');
            if (earthSurface) {
                const lon = window.Q_STATE?.location?.lon || 0;
                const siderealDayMs = 86164090;
                const utcFraction = (t % siderealDayMs) / siderealDayMs;
                const lonFraction = lon / 360;
                const bgPosition = 200 - (utcFraction * 200) - (lonFraction * 200) + 100; 
                earthSurface.style.backgroundPosition = `${bgPosition}% 0`;
            }

            // BIOMETRIC DATA SIMULATION HOOKS
            let baseRHR = 55 + Math.sin(t / 10000) * 5;
            let baseHRV = 65 + Math.cos(t / 15000) * 10;
            
            const bioRhr = document.getElementById('bio-rhr');
            if (bioRhr) bioRhr.innerText = baseRHR.toFixed(1) + " BPM";
            
            const bioHrv = document.getElementById('bio-hrv');
            if (bioHrv) bioHrv.innerText = baseHRV.toFixed(1) + " MS";

            // TIDAL GRAVITY IMPACT
            let tideStr = "NOMINAL (NEAP TIDE)";
            let tideColor = "var(--theme-main)";
            if (qData.lunarPhase < 0.05 || qData.lunarPhase > 0.95 || (qData.lunarPhase > 0.45 && qData.lunarPhase < 0.55)) {
                tideStr = "HIGH IMPACT (SPRING TIDE)";
                tideColor = "var(--friction-red)";
            }
            const tidalEl = document.getElementById('tidal-impact');
            if (tidalEl) {
                tidalEl.innerText = tideStr;
                tidalEl.style.color = tideColor;
                tidalEl.style.textShadow = tideColor === "var(--friction-red)" ? "0 0 10px rgba(255,51,51,0.4)" : "";
            }

            let activeMs = ((t % 86400000) - (anchorMins * 60000) + 86400000) % 86400000;
            let cycleDurMs = cycleDuration * 60000;
            let cyclePosFloat = (activeMs % cycleDurMs) / cycleDurMs;
            let currentBioState = (cyclePosFloat >= 0.22 && cyclePosFloat < 0.77) ? "DEEP FLOW" : "VENT/RECOVERY";
            
            if (currentBioState !== lastBioState) {
                const bioStateEl = document.getElementById('bio-state');
                if (bioStateEl) bioStateEl.innerText = currentBioState;
                
                const bioAuraEl = document.getElementById('bio-aura');
                if (bioAuraEl) bioAuraEl.className = currentBioState === "DEEP FLOW" ? "aura-glow flow-aura" : "aura-glow vent-aura";
                
                lastBioState = currentBioState;
            }
            
            const bioTimerEl = document.getElementById('bio-timer');
            if (bioTimerEl) bioTimerEl.innerText = `${Math.floor((activeMs % cycleDurMs) / 60000)} / ${cycleDuration} MIN`;
            
            const bioBarEl = document.getElementById('bio-bar');
            if (bioBarEl) bioBarEl.style.width = (cyclePosFloat * 100) + "%";
            
            const matSleepEl = document.getElementById('mat-sleep');
            if (matSleepEl) matSleepEl.innerText = currentBioState === "VENT/RECOVERY" ? "LIGHT/REM" : "DEEP";

            // PHASE COMPLETION HOOK
            let remainingMs = cycleDurMs - (activeMs % cycleDurMs);
            let completionAbsoluteMs = t + remainingMs;
            let completionDays = (completionAbsoluteMs - window.PYLON_ALPHA_DYNAMIC) / window.MS_DAY;
            
            if (window.getOrbitalData) {
                let compData = window.getOrbitalData(completionDays);
                let compCoordStr = `Q${compData.quad} S${compData.sect} D${compData.day}`;
                
                let completionEl = document.getElementById('phase-completion-q');
                if (completionEl) {
                    completionEl.innerText = compCoordStr;
                    completionEl.onclick = (ev) => {
                        ev.stopPropagation();
                        if(window.Q_OmniPlanner && window.Q_OmniPlanner.openPlanner) {
                            const d = new Date(completionAbsoluteMs);
                            window.Q_OmniPlanner.jumpToDate(`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`);
                            window.Q_OmniPlanner.openPlanner(true);
                            if(window.Q_MobileBridge) window.Q_MobileBridge.pulse('MEDIUM');
                        }
                    };
                }
            }

            const sm = calculateSolarMetrics(daysElapsed);
            const luxAvail = document.getElementById('lux-avail');
            if (luxAvail) luxAvail.innerText = sm.lux;
            
            const uvIndex = document.getElementById('uv-index');
            if (uvIndex) uvIndex.innerText = sm.uv;
            
            const lunarIllum = document.getElementById('lunar-illum');
            if (lunarIllum) lunarIllum.innerText = (qData.lunarPhase > 0.5 ? (1 - qData.lunarPhase) * 200 : qData.lunarPhase * 200).toFixed(1) + '%';
            
            const lunarPhaseName = document.getElementById('lunar-phase-name');
            if (lunarPhaseName) lunarPhaseName.innerText = getPhaseName(qData.lunarPhase);
            
            const solarNoon = document.getElementById('solar-noon');
            if (solarNoon) solarNoon.innerText = "T-" + (12 - new Date(t).getUTCHours()) + "H";
        });

        if (window.generateStars) window.generateStars('stars');
    </script>
</body>
</html>
